/* ═══════════════════════════════════════════════════
   1. WORKER PERFORMANCE & ATTENDANCE
═══════════════════════════════════════════════════ */
function WorkerPerformance({users,logs,feeds,sales}){
  const workers=users.filter(u=>u.role==="worker"&&u.approved);
  // Get last 30 days
  const today=new Date();
  const days30=Array.from({length:30},(_,i)=>{
    const d=new Date(today);d.setDate(d.getDate()-i);
    return d.toISOString().slice(0,10);
  });
  const workdays=days30.length;

  function score(w){
    const wLogs=logs.filter(l=>l.workerId===w.id);
    const wFeeds=feeds.filter(f=>f.workerId===w.id);
    const wSales=sales.filter(s=>s.workerId===w.id);
    const daysReported=new Set(wLogs.map(l=>l.date)).size;
    const attendance=Math.round((daysReported/workdays)*100);
    const pts=Math.min(100,Math.round((daysReported*3)+(wFeeds.length*2)+(wSales.length*5)));
    const revenue=wSales.reduce((s,x)=>s+(x.total||0),0);
    const sick=wLogs.reduce((s,l)=>s+(l.sick||0),0);
    return{logs:wLogs.length,feeds:wFeeds.length,sales:wSales.length,attendance,pts,revenue,sick,daysReported};
  }

  const ranked=workers.map(w=>({...w,...score(w)})).sort((a,b)=>b.pts-a.pts);
  const medal=["🥇","🥈","🥉"];

  return(<div>
    <div style={S.h1}>👷 Worker Performance</div>
    <div style={S.sub}>Last 30 days · Ranked by performance score</div>
    {workers.length===0&&<div style={{...S.card,color:C.faint,fontSize:13,textAlign:"center"}}>No workers yet.</div>}
    {ranked.map((w,i)=>{
      const color=i===0?C.amber:i===1?"#94a3b8":i===2?"#b45309":C.accent;
      const pct=Math.min(100,w.pts);
      return(<div key={w.id} style={{...S.card,marginBottom:12,border:i===0?"1.5px solid rgba(245,158,11,.4)":"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>{medal[i]||"👤"}</span>
            <div>
              <div style={{fontWeight:700,color:C.text,fontSize:14}}>{w.name}</div>
              <div style={{fontSize:11,color:C.faint}}>@{w.username}</div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:20,fontWeight:800,color:color}}>{w.pts}</div>
            <div style={{fontSize:10,color:C.faint}}>SCORE</div>
          </div>
        </div>
        {/* Progress bar */}
        <div style={{height:6,background:C.elevated,borderRadius:6,marginBottom:10,overflow:"hidden"}}>
          <div style={{height:"100%",width:pct+"%",background:color,borderRadius:6,transition:"width .4s"}}/>
        </div>
        {/* Stats grid */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
          {[
            ["📅 Attendance",w.attendance+"%",w.attendance>=80?C.accent:w.attendance>=50?C.amber:C.red],
            ["📝 Reports",w.logs,C.accent],
            ["🌾 Feedings",w.feeds,C.amber],
            ["🏷️ Sales",w.sales,"#10b981"],
          ].map(([l,v,c])=>(
            <div key={l} style={{background:C.elevated,borderRadius:7,padding:"7px 8px",textAlign:"center"}}>
              <div style={{fontSize:10,color:C.faint,marginBottom:3}}>{l}</div>
              <div style={{fontWeight:700,color:c,fontSize:14}}>{v}</div>
            </div>
          ))}
        </div>
        {w.revenue>0&&<div style={{marginTop:8,fontSize:12,color:"#10b981",textAlign:"right",fontWeight:600}}>💰 Revenue: {fmtRWF(w.revenue)}</div>}
        {w.sick>0&&<div style={{marginTop:4,fontSize:11,color:C.red}}>⚠️ Reported {w.sick} sick pig(s)</div>}
      </div>);
    })}
    {/* Attendance summary */}
    {workers.length>0&&<div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>📅 Attendance — Last 30 Days</div>
      {ranked.map(w=>(
        <div key={w.id} style={{...S.row,marginBottom:8}}>
          <span style={{color:C.text,fontSize:13}}>{w.name}</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:80,height:5,background:C.elevated,borderRadius:5,overflow:"hidden"}}>
              <div style={{height:"100%",width:w.attendance+"%",background:w.attendance>=80?C.accent:w.attendance>=50?C.amber:C.red,borderRadius:5}}/>
            </div>
            <span style={{fontSize:12,fontWeight:700,color:w.attendance>=80?C.accent:w.attendance>=50?C.amber:C.red,minWidth:35}}>{w.attendance}%</span>
          </div>
        </div>
      ))}
    </div>}
  </div>);
}

/* ═══════════════════════════════════════════════════
   2. WEEKLY REPORT
═══════════════════════════════════════════════════ */
function WeeklyReport({pigs,feeds,sales,logs,expenses,incomes,users,stock}){
  // Get this week's date range
  const today=new Date();
  const dayOfWeek=today.getDay();
  const monday=new Date(today);monday.setDate(today.getDate()-(dayOfWeek===0?6:dayOfWeek-1));
  const weekStart=monday.toISOString().slice(0,10);
  const lastMonday=new Date(monday);lastMonday.setDate(monday.getDate()-7);
  const lastWeekStart=lastMonday.toISOString().slice(0,10);
  const lastWeekEnd=new Date(monday);lastWeekEnd.setDate(monday.getDate()-1);
  const lastWeekEndStr=lastWeekEnd.toISOString().slice(0,10);

  function inRange(date,start,end){return date>=start&&date<=end;}

  // This week
  const wLogs=logs.filter(l=>l.date>=weekStart);
  const wFeeds=feeds.filter(f=>f.date>=weekStart);
  const wSales=sales.filter(s=>s.date>=weekStart);
  const wInc=wSales.reduce((s,x)=>s+(x.total||0),0)+incomes.filter(i=>i.date>=weekStart).reduce((s,x)=>s+(x.amount||0),0);
  const wExp=wFeeds.reduce((s,x)=>s+(x.cost||0),0)+expenses.filter(e=>e.date>=weekStart).reduce((s,x)=>s+(x.amount||0),0);
  const wProfit=wInc-wExp;
  const wSick=wLogs.reduce((s,l)=>s+(l.sick||0),0);
  const wDeaths=wLogs.reduce((s,l)=>s+(l.deaths||0),0);
  const wBirths=wLogs.reduce((s,l)=>s+(l.births||0),0);

  // Last week
  const lwSales=sales.filter(s=>inRange(s.date,lastWeekStart,lastWeekEndStr));
  const lwInc=lwSales.reduce((s,x)=>s+(x.total||0),0)+incomes.filter(i=>inRange(i.date,lastWeekStart,lastWeekEndStr)).reduce((s,x)=>s+(x.amount||0),0);
  const lwExp=feeds.filter(f=>inRange(f.date,lastWeekStart,lastWeekEndStr)).reduce((s,x)=>s+(x.cost||0),0)+expenses.filter(e=>inRange(e.date,lastWeekStart,lastWeekEndStr)).reduce((s,x)=>s+(x.amount||0),0);
  const lwProfit=lwInc-lwExp;

  const profitChange=lwProfit>0?Math.round(((wProfit-lwProfit)/lwProfit)*100):0;
  const lowStock=stock.filter(s=>s.quantity<=s.minLevel);
  const workers=users.filter(u=>u.role==="worker"&&u.approved);
  const activeToday=new Set(logs.filter(l=>l.date===toDay()).map(l=>l.workerId)).size;

  return(<div>
    <div style={S.h1}>📊 Weekly Report</div>
    <div style={S.sub}>Week from {weekStart} · Auto-generated</div>

    {/* This week summary */}
    <div style={S.g4}>
      {[
        {l:"This Week Income",v:fmtRWF(wInc),c:"#10b981"},
        {l:"This Week Expenses",v:fmtRWF(wExp),c:C.red},
        {l:"This Week Profit",v:fmtRWF(wProfit),c:wProfit>=0?C.accent:C.red},
        {l:"vs Last Week",v:(profitChange>=0?"+":"")+profitChange+"%",c:profitChange>=0?C.accent:C.red},
      ].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c,fontSize:14}}>{s.v}</div></div>
      ))}
    </div>

    {/* Health this week */}
    <div style={S.g4}>
      {[
        {l:"Daily Reports",v:wLogs.length,c:C.accent},
        {l:"Sick Pigs Reported",v:wSick,c:wSick>0?C.red:C.accent},
        {l:"Deaths",v:wDeaths,c:wDeaths>0?C.red:C.accent},
        {l:"New Births",v:wBirths,c:C.purple},
      ].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
      ))}
    </div>

    {/* Low stock alerts */}
    {lowStock.length>0&&<div style={{...S.card,background:"rgba(239,68,68,.05)",border:"1px solid rgba(239,68,68,.25)",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:8}}>📦 Low Stock Alerts ({lowStock.length})</div>
      {lowStock.map(s=>(
        <div key={s.id} style={S.row}>
          <span style={{color:C.text}}>{s.name}</span>
          <span style={{color:C.red,fontWeight:700}}>{s.quantity}{s.unit} left (min: {s.minLevel})</span>
        </div>
      ))}
    </div>}

    {/* Worker activity */}
    <div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>👷 Worker Activity This Week</div>
      {workers.length===0&&<div style={{color:C.faint,fontSize:13}}>No workers yet.</div>}
      {workers.map(w=>{
        const wl=wLogs.filter(l=>l.workerId===w.id).length;
        const wf=wFeeds.filter(f=>f.workerId===w.id).length;
        const ws=wSales.filter(s=>s.workerId===w.id).length;
        const active=logs.some(l=>l.workerId===w.id&&l.date===toDay());
        return(<div key={w.id} style={{...S.row,marginBottom:6}}>
          <div>
            <span style={{fontWeight:600,color:C.text}}>{w.name}</span>
            <span style={{marginLeft:8,fontSize:10,padding:"2px 7px",borderRadius:10,background:active?"rgba(22,163,74,.12)":"rgba(239,68,68,.1)",color:active?C.accent:C.red}}>{active?"● Active today":"○ No report today"}</span>
          </div>
          <div style={{fontSize:11,color:C.faint}}>{wl} logs · {wf} feeds · {ws} sales</div>
        </div>);
      })}
    </div>

    {/* Sales this week */}
    {wSales.length>0&&<div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:"#10b981",marginBottom:10}}>🏷️ Sales This Week ({wSales.length})</div>
      {wSales.map((s,i)=>{
        const pig=pigs.find(p=>p.id===s.pigId);
        return(<div key={i} style={S.row}>
          <span style={{color:C.muted,fontSize:12}}>{s.date} · {s.worker} · {pig?pig.tag:"—"}</span>
          <span style={{color:"#10b981",fontWeight:700}}>{fmtRWF(s.total)}</span>
        </div>);
      })}
    </div>}
  </div>);
}

/* ═══════════════════════════════════════════════════
   3. TASK ASSIGNMENT
═══════════════════════════════════════════════════ */
function TaskManager({user,users,tasks,setTasks}){
  const isAdmin=user.role==="admin";
  const workers=users.filter(u=>u.role==="worker"&&u.approved);
  const [form,setForm]=useState({title:"",desc:"",workerId:"",priority:"Normal",due:toDay()});
  const [saved,setSaved]=useState(false);
  const myTasks=isAdmin?tasks:tasks.filter(t=>t.workerId===user.id);

  async function addTask(){
    if(!form.title||(!isAdmin?false:!form.workerId)) return;
    const newTask={...form,id:uid(),createdBy:user.name,createdAt:toDay(),status:"pending",workerId:isAdmin?form.workerId:user.id};
    setTasks(p=>[...p,newTask]);
    try{await jbinAppend("tasks",newTask);setSaved(true);setTimeout(()=>{setSaved(false);setForm({title:"",desc:"",workerId:"",priority:"Normal",due:toDay()});},2000);}
    catch(e){alert("❌ Failed to save task.");}
  }

  async function updateStatus(id,status){
    const updated=tasks.map(t=>t.id===id?{...t,status}:t);
    setTasks(updated);
    try{
      const data=await getOnlineFarmData()||{};
      await setOnlineFarmData({...data,tasks:updated});
    }catch(e){console.error("task update error",e);}
  }

  const pending=myTasks.filter(t=>t.status==="pending");
  const done=myTasks.filter(t=>t.status==="done");
  const priorityColor={High:C.red,Normal:C.accent,Low:C.muted};

  return(<div>
    <div style={S.h1}>✅ Task Manager</div>
    <div style={S.sub}>{pending.length} pending · {done.length} completed</div>

    {/* Add task — admin only */}
    {isAdmin&&<div style={{...S.card,marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:12}}>➕ Assign New Task</div>
      {saved&&<div style={{padding:8,background:C.accentSoft,borderRadius:7,marginBottom:10,color:C.accent,fontSize:13}}>✓ Task assigned!</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Task Title *</label><input placeholder="e.g. Clean pig pens" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} style={S.inp}/></div>
        <div><label style={S.lbl}>Assign To *</label>
          <select value={form.workerId} onChange={e=>setForm({...form,workerId:e.target.value})} style={S.inp}>
            <option value="">Select worker</option>
            {workers.map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
          </select>
        </div>
        <div><label style={S.lbl}>Priority</label>
          <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} style={S.inp}>
            {["High","Normal","Low"].map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
        <div><label style={S.lbl}>Due Date</label><input type="date" value={form.due} onChange={e=>setForm({...form,due:e.target.value})} style={S.inp}/></div>
        <div><label style={S.lbl}>Description</label><input placeholder="Details..." value={form.desc} onChange={e=>setForm({...form,desc:e.target.value})} style={S.inp}/></div>
      </div>
      <button onClick={addTask} style={{...S.btn(),width:"100%",padding:11,fontSize:14}}>Assign Task →</button>
    </div>}

    {/* Pending tasks */}
    {pending.length===0&&<div style={{...S.card,color:C.faint,fontSize:13,textAlign:"center"}}>
      {isAdmin?"No pending tasks. Assign one above!":"No tasks assigned to you yet."}
    </div>}
    {pending.map(t=>{
      const worker=users.find(u=>u.id===t.workerId);
      const overdue=t.due&&t.due<toDay();
      return(<div key={t.id} style={{...S.card,marginBottom:10,border:"1px solid "+(overdue?"rgba(239,68,68,.3)":C.border)}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div>
            <div style={{fontWeight:700,color:C.text,fontSize:14}}>{t.title}</div>
            {t.desc&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{t.desc}</div>}
          </div>
          <span style={{padding:"2px 9px",borderRadius:12,background:priorityColor[t.priority]+"22",color:priorityColor[t.priority],fontSize:11,fontWeight:700,flexShrink:0}}>{t.priority}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:C.faint,marginBottom:10}}>
          <span>👤 {worker?worker.name:"—"} · 📅 Due: <span style={{color:overdue?C.red:C.muted,fontWeight:overdue?700:400}}>{t.due}{overdue?" ⚠️ OVERDUE":""}</span></span>
          <span>By: {t.createdBy}</span>
        </div>
        <button onClick={()=>updateStatus(t.id,"done")} style={{...S.btn(C.accent),fontSize:12,padding:"6px 14px",width:"100%"}}>✓ Mark as Done</button>
      </div>);
    })}

    {/* Completed tasks */}
    {done.length>0&&<div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>✅ Completed ({done.length})</div>
      {done.slice().reverse().map(t=>{
        const worker=users.find(u=>u.id===t.workerId);
        return(<div key={t.id} style={{...S.row,opacity:.7}}>
          <span style={{color:C.muted,fontSize:12,textDecoration:"line-through"}}>{t.title} · {worker?worker.name:"—"}</span>
          <span style={{color:C.accent,fontSize:11}}>✓ Done</span>
        </div>);
      })}
    </div>}
  </div>);
}

function VaccinationTracker({pigs,users,vaccinations,setVaccinations,user}){
  const isAdmin=user.role==="admin";
  const active=pigs.filter(p=>p.status==="active");
  const [form,setForm]=useState({pigId:"",vaccine:"CSF Vaccine",date:toDay(),nextDue:"",notes:"",givenBy:user.name});
  const [saved,setSaved]=useState(false);
  const VACCINES=["CSF Vaccine","FMD Vaccine","Ivermectin","Dewormer","Vitamin B12","Other"];

  async function save(){
    if(!form.pigId||!form.date)return;
    const nextDue=form.nextDue||addDays(form.date,180);
    const newVac={...form,id:uid(),nextDue,createdAt:toDay()};
    setVaccinations(p=>[...p,newVac]);
    try{await jbinAppend("vaccinations",newVac);setSaved(true);setTimeout(()=>{setSaved(false);setForm({pigId:"",vaccine:"CSF Vaccine",date:toDay(),nextDue:"",notes:"",givenBy:user.name});},2000);}
    catch(e){alert("❌ Failed to save.");}
  }

  const due=vaccinations.filter(v=>{
    const d=daysDiff(v.nextDue);
    return d>=0&&d<=14;
  });
  const overdue=vaccinations.filter(v=>daysDiff(v.nextDue)<0);

  return(<div>
    <div style={S.h1}>💉 Vaccination Tracker</div>
    <div style={S.sub}>Track vaccinations · Get due date alerts</div>

    {/* Alerts */}
    {overdue.length>0&&<div style={{...S.card,background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.3)",marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:8}}>⚠️ Overdue Vaccinations ({overdue.length})</div>
      {overdue.map(v=>{const pig=pigs.find(p=>p.id===v.pigId);return(
        <div key={v.id} style={S.row}><span style={{color:C.text}}>{pig?pig.tag:"—"} — {v.vaccine}</span><span style={{color:C.red,fontWeight:700}}>{Math.abs(daysDiff(v.nextDue))} days overdue</span></div>
      );})}
    </div>}
    {due.length>0&&<div style={{...S.card,background:"rgba(245,158,11,.06)",border:"1px solid rgba(245,158,11,.3)",marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,color:C.amber,marginBottom:8}}>🔔 Due Soon ({due.length})</div>
      {due.map(v=>{const pig=pigs.find(p=>p.id===v.pigId);return(
        <div key={v.id} style={S.row}><span style={{color:C.text}}>{pig?pig.tag:"—"} — {v.vaccine}</span><span style={{color:C.amber,fontWeight:700}}>Due in {daysDiff(v.nextDue)} days</span></div>
      );})}
    </div>}

    {/* Log vaccination */}
    <div style={{...S.card,marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:12}}>💉 Log Vaccination</div>
      {saved&&<div style={{padding:8,background:C.accentSoft,borderRadius:7,marginBottom:10,color:C.accent,fontSize:13}}>✓ Vaccination recorded!</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div><label style={S.lbl}>Pig *</label>
          <select value={form.pigId} onChange={e=>setForm({...form,pigId:e.target.value})} style={S.inp}>
            <option value="">Select pig</option>
            {active.map(p=><option key={p.id} value={p.id}>{p.tag} — {p.stage}</option>)}
          </select>
        </div>
        <div><label style={S.lbl}>Vaccine *</label>
          <select value={form.vaccine} onChange={e=>setForm({...form,vaccine:e.target.value})} style={S.inp}>
            {VACCINES.map(v=><option key={v}>{v}</option>)}
          </select>
        </div>
        <div><label style={S.lbl}>Date Given</label><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={S.inp}/></div>
        <div><label style={S.lbl}>Next Due Date</label><input type="date" value={form.nextDue} onChange={e=>setForm({...form,nextDue:e.target.value})} style={S.inp}/></div>
        <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Notes</label><input placeholder="Any observations..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={S.inp}/></div>
      </div>
      <button onClick={save} style={{...S.btn(C.accent),width:"100%",padding:11,fontSize:14}}>💉 Save Vaccination →</button>
    </div>

    {/* History */}
    <div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>📋 Vaccination History ({vaccinations.length})</div>
      {vaccinations.length===0&&<div style={{color:C.faint,fontSize:13}}>No vaccinations recorded yet.</div>}
      {vaccinations.slice().reverse().map((v,i)=>{
        const pig=pigs.find(p=>p.id===v.pigId);
        const dLeft=daysDiff(v.nextDue);
        return(<div key={i} style={S.row}>
          <div>
            <div style={{fontWeight:600,color:C.text}}>{pig?pig.tag:"—"} — {v.vaccine}</div>
            <div style={{fontSize:11,color:C.faint}}>Given: {v.date} · By: {v.givenBy}</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:dLeft<0?C.red:dLeft<=14?C.amber:C.accent,fontWeight:600}}>
              Next: {v.nextDue}
            </div>
            <div style={{fontSize:10,color:C.faint}}>{dLeft<0?"Overdue":dLeft===0?"Today!":"In "+dLeft+" days"}</div>
          </div>
        </div>);
      })}
    </div>
  </div>);
}

/* ─── Login ─── */
function Login({users,setUsers,setUser}){
  const [tab,setTab]=useState("login");
  const [form,setForm]=useState({name:"",username:"",password:"",confirmPassword:""});
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");
  const [loading,setLoading]=useState(false);

  async function login(){
    setErr("");
    if(!form.username||!form.password) return setErr("Please enter username and password.");
    setLoading(true);
    // First check INIT_USERS (admin always works from hardcoded credentials)
    const localMatch=INIT_USERS.find(u=>u.username.toLowerCase()===form.username.toLowerCase()&&u.password===form.password);
    if(localMatch){setLoading(false);setUser(localMatch);return;}
    // Then check JSONBin for workers
    let freshUsers=await getOnlineUsers();
    if(!freshUsers||freshUsers.length===0) freshUsers=users;
    const u=freshUsers.find(u=>u.username.toLowerCase()===form.username.toLowerCase()&&u.password===form.password);
    setLoading(false);
    if(!u) return setErr("Incorrect username or password.");
    if(!u.approved) return setErr("Your account is pending admin approval. Please wait.");
    setUser(u);
  }

  async function reg(){
    setErr("");
    if(!form.name||!form.username||!form.password) return setErr("Please fill in all required fields.");
    if(form.password.length<6) return setErr("Password must be at least 6 characters.");
    if(form.password!==form.confirmPassword) return setErr("Passwords do not match.");
    setLoading(true);
    try{
      // Try to get fresh users, but fall back to local if Firebase is slow
      let freshUsers=users;
      try{
        const fromDB=await getOnlineUsers();
        if(fromDB&&fromDB.length>0) freshUsers=fromDB;
      }catch(e){
        // Firebase fetch failed, use local users — still allow registration
        console.warn("Could not fetch fresh users, using local",e);
      }
      if(freshUsers.find(u=>u.username.toLowerCase()===form.username.toLowerCase())){
        setLoading(false);
        return setErr("That username is already taken.");
      }
      const newUser={id:uid(),name:form.name.trim(),username:form.username.trim(),password:form.password,role:"worker",approved:false};
      const updated=[...freshUsers,newUser];
      try{
        await setOnlineUsers(updated);
      }catch(e){
        console.error("Firebase save failed, saved locally only",e);
      }
      setUsers(updated);
      setOk("Account created! An admin must approve your access before you can sign in.");
      setErr("");
      setTab("login");
      setForm({name:"",username:"",password:"",confirmPassword:""});
    }catch(e){
      console.error("reg error",e);
      setErr("Something went wrong. Please try again.");
    }
    setLoading(false);
  }

  const cardStyle={
    width:420,background:"#fff",borderRadius:20,
    boxShadow:"0 20px 60px rgba(0,0,0,.12), 0 4px 16px rgba(22,163,74,.08)",
    overflow:"hidden",border:"1px solid rgba(22,163,74,.15)"

    borderRadius:10,padding:"11px 14px",width:"100%",fontSize:13.5,outline:"none",

  };
  const lbl2={fontSize:11,color:"#64748b",display:"block",marginBottom:5,letterSpacing:.5,fontWeight:600,textTransform:"uppercase"};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f0fdf4 0%,#ecfdf5 40%,#e0f2fe 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {/* Decorative background blobs */}
      <div style={{position:"fixed",top:"-10%",right:"-5%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(22,163,74,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:"-10%",left:"-5%",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(16,185,129,.06) 0%,transparent 70%)",pointerEvents:"none"}}/>

      <div style={cardStyle} className="fade-in">
        {/* Header */}

          {/* Decorative circles */}
          <div style={{position:"absolute",top:-30,right:-30,width:130,height:130,borderRadius:"50%",background:"rgba(74,222,128,.06)",border:"1px solid rgba(74,222,128,.12)"}}/>
          <div style={{position:"absolute",bottom:-20,left:-20,width:90,height:90,borderRadius:"50%",background:"rgba(74,222,128,.04)"}}/>
          <div style={{position:"relative",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:14,background:"rgba(74,222,128,.15)",border:"1px solid rgba(74,222,128,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>🐷</div>
            <div>

function AHome({pigs,feeds,sales,logs,users,expenses,incomes,reproductions,stock,allData,setPage}){

  const totalInc=sales.reduce((s,l)=>s+(l.total||0),0)+incomes.reduce((s,l)=>s+(l.amount||0),0);
  const totalExp=feeds.reduce((s,l)=>s+(l.cost||0),0)+expenses.reduce((s,l)=>s+(l.amount||0),0);
  const profit=totalInc-totalExp;
  const herdValue=active.reduce((s,pig)=>s+getMarketPrice(pig.stage,pig.weight),0);
  const pregnant=reproductions.filter(r=>r.status==="pregnant");
  const lowStock=stock.filter(s=>s.quantity<=s.minLevel);
  const upcomingFarrows=pregnant.filter(r=>daysDiff(r.expectedFarrow)<=7&&daysDiff(r.expectedFarrow)>=0);
  const recentActivity=[...feeds.map(f=>({...f,type:"feed"})),...sales.map(s=>({...s,type:"sale"})),...logs.map(l=>({...l,type:"log"}))].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,6);
  return(<div>
    <div style={S.h1}>📊 Farm Overview</div>
    <div style={S.sub}>{toDay()} · FarmIQ AI Management</div>

    {/* Smart alerts */}
    {upcomingFarrows.length>0&&<div onClick={()=>setPage("reproduction")} style={{padding:"10px 14px",background:"rgba(244,114,182,.08)",border:"1px solid rgba(244,114,182,.3)",borderRadius:9,marginBottom:10,fontSize:13,color:C.pink,cursor:"pointer"}}>
      🐖 {upcomingFarrows.length} farrowing(s) in ≤7 days → Click to view
    </div>}
    {lowStock.length>0&&<div onClick={()=>setPage("stock")} style={{padding:"10px 14px",background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.25)",borderRadius:9,marginBottom:10,fontSize:13,color:C.red,cursor:"pointer"}}>
      📦 {lowStock.length} low stock alert(s): {lowStock.map(s=>s.name).join(", ")} → Click to restock
    </div>}

    {/* Main stats */}
    <div style={S.g4}>
      {[{l:"Active Pigs",v:active.length,c:C.accent},{l:"Total Income",v:fmtRWF(totalInc),c:"#10b981"},{l:"Net Profit",v:fmtRWF(profit),c:profit>=0?C.accent:C.red},{l:"Herd Value",v:fmtRWF(herdValue),c:C.purple}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c,fontSize:s.v.length>8?15:22}}>{s.v}</div></div>
      ))}
    </div>
    <div style={S.g4}>
      {[{l:"Market Ready (80kg+)",v:active.filter(p=>p.weight>=80).length,c:C.amber},{l:"Pregnant Sows",v:pregnant.length,c:C.pink},{l:"Workers",v:users.filter(u=>u.role==="worker"&&u.approved).length,c:C.blue},{l:"Logs Today",v:logs.filter(l=>l.date===toDay()).length,c:C.muted}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
      ))}
    </div>

    <div style={S.g2}>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>📋 Recent Activity</div>
        {recentActivity.length===0&&<div style={{color:C.faint,fontSize:13}}>No activity yet.</div>}
        {recentActivity.map((l,i)=>(
          <div key={i} style={S.row}><span style={{color:C.muted}}>{l.type==="feed"?"🌾 ":l.type==="sale"?"🏷️ ":"📝 "}{l.worker||l.buyer}</span><span style={{color:C.accent,fontWeight:600}}>{l.total?fmtRWF(l.total):l.cost?fmtRWF(l.cost):"✓"}</span></div>

/* ─── Financials ─── */
function Fin({feeds,sales,pigs,logs,expenses,incomes,allData}){
  const totalSaleInc=sales.reduce((s,l)=>s+(l.total||0),0);
  const totalOtherInc=incomes.reduce((s,l)=>s+(l.amount||0),0);
  const totalIncome=totalSaleInc+totalOtherInc;
  const totalFeedCost=feeds.reduce((s,l)=>s+(l.cost||0),0);
  const totalOtherExp=expenses.reduce((s,l)=>s+(l.amount||0),0);
  const totalExpense=totalFeedCost+totalOtherExp;
  const profit=totalIncome-totalExpense;
  const roi=totalExpense>0?((profit/totalExpense)*100).toFixed(1):"—";
  const months={};
  [...sales.map(s=>({date:s.date,rev:s.total,cost:0})),...incomes.map(i=>({date:i.date,rev:i.amount,cost:0})),...feeds.map(f=>({date:f.date,rev:0,cost:f.cost})),...expenses.map(e=>({date:e.date,rev:0,cost:e.amount}))].forEach(l=>{const m=l.date&&l.date.slice(0,7);if(!m)return;if(!months[m])months[m]={rev:0,cost:0};months[m].rev+=l.rev;months[m].cost+=l.cost;});
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <div style={S.h1}>Financial Dashboard</div>
      <PDFBtn label="Finance PDF" type="finance" getData={()=>allData} icon="💰" color="#374151"/>
    </div>
    <div style={S.g4}>
      {[{l:"Total Income",v:fmtRWF(totalIncome),c:"#10b981"},{l:"Total Expenses",v:fmtRWF(totalExpense),c:C.red},{l:"Net Profit",v:fmtRWF(profit),c:profit>=0?C.accent:C.red},{l:"ROI",v:roi==="—"?"—":roi+"%",c:C.purple}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c,fontSize:18}}>{s.v}</div></div>
      ))}
    </div>
    <div style={S.g2}>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:"#10b981",marginBottom:10}}>💚 Income Breakdown</div>
        <div style={S.row}><span style={{color:C.muted}}>🏷️ Pig Sales</span><span style={{color:"#10b981",fontWeight:700}}>{fmtRWF(totalSaleInc)}</span></div>
        <div style={S.row}><span style={{color:C.muted}}>💰 Other Income</span><span style={{color:"#10b981",fontWeight:700}}>{fmtRWF(totalOtherInc)}</span></div>
      </div>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:10}}>🔴 Expense Breakdown</div>
        <div style={S.row}><span style={{color:C.muted}}>🌾 Feed Costs</span><span style={{color:C.red,fontWeight:700}}>{fmtRWF(totalFeedCost)}</span></div>
        <div style={S.row}><span style={{color:C.muted}}>📦 Other Expenses</span><span style={{color:C.red,fontWeight:700}}>{fmtRWF(totalOtherExp)}</span></div>
      </div>
    </div>
    <div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>Monthly Summary</div>
      {Object.keys(months).length===0?<div style={{color:C.faint,fontSize:13}}>No data yet.</div>:
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead><tr>{["Month","Income","Expenses","Profit"].map(h=><th key={h} style={{textAlign:"left",color:C.faint,paddingBottom:8,borderBottom:"1px solid "+C.border,fontSize:11}}>{h}</th>)}</tr></thead>
          <tbody>{Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).map(([m,v])=>(
            <tr key={m} style={{borderBottom:"1px solid "+C.elevated}}>
              <td style={{padding:"7px 0",color:C.muted}}>{m}</td>
              <td style={{color:"#10b981"}}>{fmtRWF(v.rev)}</td>
              <td style={{color:C.red}}>{fmtRWF(v.cost)}</td>
              <td style={{color:v.rev-v.cost>=0?C.accent:C.red,fontWeight:700}}>{fmtRWF(v.rev-v.cost)}</td>
            </tr>
          ))}</tbody>
        </table>}
    </div>
    <div style={{fontSize:14,fontWeight:700,color:C.accent,margin:"6px 0 12px"}}>✦ AI Financial Analysis</div>
    <AIPrediction pigs={pigs} feeds={feeds} sales={sales} logs={logs} expenses={expenses} incomes={incomes} topic="Full financial analysis: revenue optimization, expense reduction, break-even, scaling investment for Rwanda." label="Financial Strategy" icon="💰"/>
  </div>);
}

/* ─── Change Password ─── */
function ChangePassword({user,users,setUsers}){
  const [form,setForm]=useState({current:"",newPass:"",confirm:""});
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");
  const [saving,setSaving]=useState(false);

  async function save(){
    setErr("");setOk("");
    if(!form.current||!form.newPass||!form.confirm) return setErr("Please fill in all fields.");
    if(form.newPass.length<6) return setErr("New password must be at least 6 characters.");
    if(form.newPass!==form.confirm) return setErr("New passwords do not match.");
    const me=users.find(u=>u.id===user.id);
    if(!me||me.password!==form.current) return setErr("Current password is incorrect.");
    setSaving(true);
    const updated=users.map(u=>u.id===user.id?{...u,password:form.newPass}:u);
    setUsers(updated);
    try{
      await setOnlineUsers(updated);
      setOk("✅ Password changed successfully!");
      setForm({current:"",newPass:"",confirm:""});
    }catch(e){setErr("Failed to save. Check internet and try again.");}
    setSaving(false);
  }

  return(<div style={{maxWidth:420}}>
    <div style={S.h1}>🔒 Change Password</div>
    <div style={S.sub}>Update your login password</div>
    <div style={S.card}>
      {err&&<div style={{padding:"9px 13px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.25)",borderRadius:8,color:C.red,fontSize:13,marginBottom:12}}>{err}</div>}
      {ok&&<div style={{padding:"9px 13px",background:"rgba(22,163,74,.08)",border:"1px solid rgba(22,163,74,.25)",borderRadius:8,color:C.accent,fontSize:13,marginBottom:12}}>{ok}</div>}
      <div style={{marginBottom:12}}>
        <label style={S.lbl}>Current Password</label>
        <input type="password" placeholder="Enter current password" value={form.current} onChange={e=>setForm({...form,current:e.target.value})} style={S.inp}/>
      </div>
      <div style={{marginBottom:12}}>
        <label style={S.lbl}>New Password</label>
        <input type="password" placeholder="Min 6 characters" value={form.newPass} onChange={e=>setForm({...form,newPass:e.target.value})} style={S.inp}/>
      </div>
      <div style={{marginBottom:16}}>
        <label style={S.lbl}>Confirm New Password</label>
        <input type="password" placeholder="Repeat new password" value={form.confirm} onChange={e=>setForm({...form,confirm:e.target.value})} style={S.inp}/>
      </div>
      <button onClick={save} disabled={saving} style={{...S.btn(),width:"100%",padding:12,fontSize:14}}>
        {saving?"⏳ Saving...":"🔒 Change Password"}
      </button>
    </div>
  </div>);
}

/* ─── Workers ─── */
function Workers({users,setUsers}){
  const [saving,setSaving]=React.useState(null);
  const [refreshing,setRefreshing]=React.useState(false);
  const [lastCheck,setLastCheck]=React.useState("");
  const pending=users.filter(u=>u.role==="worker"&&!u.approved);
  const approved=users.filter(u=>u.role==="worker"&&u.approved);

  // Auto-refresh every 10 seconds when on this page
  useEffect(()=>{
    refresh();
    const t=setInterval(refresh,10000);
    return()=>clearInterval(t);
  },[]);

  async function refresh(){
    setRefreshing(true);
    try{
      const fresh=await getOnlineUsers();
      if(fresh&&fresh.length>0) setUsers([...fresh]);
      setLastCheck(new Date().toLocaleTimeString());
    }catch(e){}
    setRefreshing(false);
  }

  async function approve(id){
    setSaving(id);
    const updated=users.map(u=>u.id===id?{...u,approved:true}:u);
    setUsers(updated);
    try{await setOnlineUsers(updated);}catch(e){console.error("approve error",e);}
    setSaving(null);
  }
  async function reject(id){
    setSaving(id);
    const updated=users.filter(u=>u.id!==id);
    setUsers(updated);
    try{await setOnlineUsers(updated);}catch(e){console.error("reject error",e);}
    setSaving(null);
  }
  async function removeWorker(id){
    setSaving(id);
    const updated=users.filter(u=>u.id!==id);
    setUsers(updated);
    try{await setOnlineUsers(updated);}catch(e){console.error("remove error",e);}
    setSaving(null);
  }

  return(<div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
      <div style={S.h1}>Worker Management</div>
      <button onClick={refresh} disabled={refreshing} style={{
        padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",
        background:"rgba(22,163,74,.12)",color:C.accent,fontWeight:700,
        fontSize:12,fontFamily:"inherit",display:"flex",alignItems:"center",gap:6
      }}>
        <span style={refreshing?{display:"inline-block",animation:"spin .8s linear infinite"}:{}}>🔄</span>
        {refreshing?"Checking…":"Refresh"}
      </button>
    </div>
    <div style={{...S.sub,marginBottom:14}}>{approved.length} active · {pending.length} pending · {lastCheck&&"Last checked: "+lastCheck}</div>
    {pending.length>0&&<div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.amber,marginBottom:10}}>⏳ Pending Approval ({pending.length})</div>
      {pending.map(w=><div key={w.id} style={{...S.row,background:"rgba(245,158,11,.05)"}}>
        <div><div style={{fontWeight:600}}>{w.name}</div><div style={{fontSize:11,color:C.faint}}>@{w.username}</div></div>
        <div>
          <button style={S.btn("#166534")} disabled={saving===w.id} onClick={()=>approve(w.id)}>{saving===w.id?"⏳":"✓ Approve"}</button>
          <button style={S.btn("#991b1b")} disabled={saving===w.id} onClick={()=>reject(w.id)}>{saving===w.id?"⏳":"✗ Reject"}</button>
        </div>
      </div>)}
    </div>}
    {pending.length===0&&<div style={{...S.card,textAlign:"center",color:C.faint,fontSize:13}}>✅ No pending approvals.</div>}
    <div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>✅ Active Workers ({approved.length})</div>
      {approved.length===0&&<div style={{color:C.faint,fontSize:13}}>No workers yet.</div>}
      {approved.map(w=><div key={w.id} style={S.row}>
        <div><div style={{fontWeight:600}}>{w.name}</div><div style={{fontSize:11,color:C.faint}}>@{w.username}</div></div>
        <button style={{...S.btn(C.red),padding:"5px 11px",fontSize:11}} disabled={saving===w.id} onClick={()=>removeWorker(w.id)}>{saving===w.id?"⏳":"Remove"}</button>
      </div>)}
    </div>
  </div>);
}

/* ─── Worker Views ─── */
function WHome({user,logs,feeds,sales,messages}){
  const ml=logs.filter(l=>l.workerId===user.id);
  const mf=feeds.filter(f=>f.workerId===user.id);
  const ms=sales.filter(s=>s.workerId===user.id);
  const latest=messages[messages.length-1];
  return(<div>
    <div style={S.h1}>Welcome, {user.name}!</div>
    {latest&&<div style={{padding:"11px 14px",background:"rgba(22,163,74,.06)",border:"1px solid rgba(22,163,74,.25)",borderRadius:9,marginBottom:14,fontSize:13}}>
      <div style={{fontWeight:600,color:C.accent,marginBottom:3}}>📢 From {latest.from}:</div>
      <div style={{color:C.text}}>{latest.text}</div>
      <div style={{fontSize:10,color:C.faint,marginTop:3}}>{latest.date}</div>
    </div>}
    {!ml.some(l=>l.date===toDay())&&<div style={{padding:"11px 14px",background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.3)",borderRadius:9,marginBottom:14,color:C.amber,fontSize:13}}>⚠️ Please submit your daily report today!</div>}
    <div style={S.g4}>
      {[{l:"Daily Reports",v:ml.length,c:C.accent},{l:"Feeding Logs",v:mf.length,c:C.amber},{l:"Sales",v:ms.length,c:"#10b981"},{l:"My Revenue",v:fmtRWF(ms.reduce((s,l)=>s+l.total,0)),c:C.purple}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
      ))}
    </div>
  </div>);
}

function WorkerInbox({messages}){
  return(<div>
    <div style={S.h1}>📬 Messages from Admin</div>
    <div style={S.sub}>{messages.length} message(s)</div>
    {messages.length===0&&<div style={{...S.card,color:C.faint,fontSize:13}}>No messages yet.</div>}
    {messages.slice().reverse().map((m,i)=>(
      <div key={i} style={{...S.card,border:i===0?"1px solid rgba(22,163,74,.3)":undefined}}>
        {i===0&&<div style={{fontSize:9,color:C.accent,marginBottom:7,letterSpacing:1,textTransform:"uppercase",fontWeight:700}}>● Latest</div>}
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
          <div style={{fontWeight:600,color:C.accent}}>📢 {m.from}</div>
          <div style={{fontSize:11,color:C.faint}}>{m.date} · {m.time}</div>
        </div>
        <div style={{fontSize:13,color:C.text,lineHeight:1.7,padding:"9px 12px",background:C.elevated,borderRadius:7}}>{m.text}</div>
      </div>
    ))}
  </div>);
}

function DEntry({user,pigs,logs,setLogs}){
  const active=pigs.filter(p=>p.status==="active");
  const [form,setForm]=useState({checked:active.length,sick:0,deaths:0,births:0,water:true,cleaned:true,notes:""});
  const [done,setDone]=useState(false);
  if(logs.some(l=>l.workerId===user.id&&l.date===toDay())||done)return(<div style={{textAlign:"center",padding:60}}><div style={{fontSize:48}}>✅</div><div style={{fontSize:19,fontWeight:700,color:C.accent,marginTop:14}}>Report submitted!</div><div style={{fontSize:13,color:C.faint,marginTop:6}}>Come back tomorrow.</div></div>);
  return(<div style={{maxWidth:490}}><div style={S.h1}>Daily Report — {toDay()}</div><div style={S.card}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
      {[["checked","Pigs Checked"],["sick","Sick Pigs"],["deaths","Deaths"],["births","New Births"]].map(([k,l])=>(
        <div key={k}><label style={S.lbl}>{l}</label><input type="number" min="0" value={form[k]} onChange={e=>setForm({...form,[k]:parseInt(e.target.value)||0})} style={S.inp}/></div>
      ))}
      {[["water","Water OK?"],["cleaned","Pen Cleaned?"]].map(([k,l])=>(
        <div key={k}><label style={S.lbl}>{l}</label><select value={form[k]?"yes":"no"} onChange={e=>setForm({...form,[k]:e.target.value==="yes"})} style={S.inp}><option value="yes">Yes ✓</option><option value="no">No ✗</option></select></div>
      ))}
    </div>
    <div style={{marginBottom:12}}><label style={S.lbl}>Notes</label><textarea rows={3} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Any observations..." style={{...S.inp,resize:"vertical"}}/></div>
    <button style={{...S.btn(),width:"100%",padding:12,fontSize:14}} onClick={async()=>{
    const newLog={...form,id:uid(),workerId:user.id,worker:user.name,date:toDay()};
    setLogs(p=>[...p,newLog]);
    try{
      await jbinAppend("logs",newLog);
      setDone(true);
    }catch(e){alert("❌ Failed to save. Check internet and try again.");}
  }}>Submit Report →</button>
  </div></div>);
}

function FEntry({user,pigs,feeds,setFeeds}){
  const [form,setForm]=useState({pigId:"",feedType:"Maize bran",kg:"",cost:"",notes:""});
  const [saved,setSaved]=useState(false);
  const active=pigs.filter(p=>p.status==="active");
  async function submit(){
    if(!form.kg||!form.cost)return;
    const newFeed={...form,id:uid(),workerId:user.id,worker:user.name,date:toDay(),kg:parseFloat(form.kg),cost:parseFloat(form.cost)};
    setFeeds(p=>[...p,newFeed]);
    try{
      await jbinAppend("feeds",newFeed);
      setSaved(true);
      setTimeout(()=>{setSaved(false);setForm({pigId:"",feedType:"Maize bran",kg:"",cost:"",notes:""});},2000);
    }catch(e){alert("❌ Failed to save. Check internet and try again.");}
  }
  return(<div style={{maxWidth:490}}><div style={S.h1}>Log Feeding</div>
    {saved&&<div style={{padding:10,background:C.accentSoft,borderRadius:7,marginBottom:12,color:C.accent,fontSize:13}}>✓ Saved!</div>}
    <div style={S.card}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div><label style={S.lbl}>Pig</label><select value={form.pigId} onChange={e=>setForm({...form,pigId:e.target.value})} style={S.inp}><option value="">All pigs</option>{active.map(p=><option key={p.id} value={p.id}>{p.tag}</option>)}</select></div>
        <div><label style={S.lbl}>Feed Type</label><select value={form.feedType} onChange={e=>setForm({...form,feedType:e.target.value})} style={S.inp}>{["Maize bran","Soya meal","Pellets","Kitchen waste","Mixed","Other"].map(f=><option key={f}>{f}</option>)}</select></div>
        <div><label style={S.lbl}>Amount (kg)</label><input type="number" placeholder="15" value={form.kg} onChange={e=>setForm({...form,kg:e.target.value})} style={S.inp}/></div>
        <div><label style={S.lbl}>Cost (RWF)</label><input type="number" placeholder="3500" value={form.cost} onChange={e=>setForm({...form,cost:e.target.value})} style={S.inp}/></div>
      </div>
      <div style={{marginBottom:12}}><label style={S.lbl}>Notes</label><input placeholder="Observations..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={S.inp}/></div>
      <button style={{...S.btn(C.amber),color:"#fff",width:"100%",padding:12,fontSize:14}} onClick={submit}>Save Feeding →</button>
    </div>
  </div>);
}

function SEntry({user,pigs,setPigs,sales,setSales}){
  const [form,setForm]=useState({pigId:"",buyer:"",weight:"",priceKg:"",total:"",notes:""});
  const [saved,setSaved]=useState(false);
  const active=pigs.filter(p=>p.status==="active");
  function upd(f){return f.weight&&f.priceKg?{...f,total:(parseFloat(f.weight)*parseFloat(f.priceKg)).toString()}:f;}
  async function submit(){
    if(!form.total)return;
    const newSale={...form,id:uid(),workerId:user.id,worker:user.name,date:toDay(),weight:parseFloat(form.weight)||0,priceKg:parseFloat(form.priceKg)||0,total:parseFloat(form.total)};
    setSales(p=>[...p,newSale]);
    if(form.pigId) setPigs(p=>p.map(pig=>pig.id===form.pigId?{...pig,status:"sold"}:pig));
    try{
      await jbinAppend("sales",newSale);
      setSaved(true);
      setTimeout(()=>{setSaved(false);setForm({pigId:"",buyer:"",weight:"",priceKg:"",total:"",notes:""});},2000);
    }catch(e){alert("❌ Failed to save. Check internet and try again.");}
  }
  return(<div style={{maxWidth:490}}><div style={S.h1}>Log a Sale</div>
    {saved&&<div style={{padding:10,background:C.accentSoft,borderRadius:7,marginBottom:12,color:C.accent,fontSize:13}}>✓ Sale recorded!</div>}
    <div style={S.card}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Pig Sold</label><select value={form.pigId} onChange={e=>setForm({...form,pigId:e.target.value})} style={S.inp}><option value="">Select pig</option>{active.map(p=><option key={p.id} value={p.id}>{p.tag} — {p.stage}</option>)}</select></div>
        <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Buyer</label><input placeholder="Buyer name" value={form.buyer} onChange={e=>setForm({...form,buyer:e.target.value})} style={S.inp}/></div>
        <div><label style={S.lbl}>Weight (kg)</label><input type="number" placeholder="80" value={form.weight} onChange={e=>setForm(upd({...form,weight:e.target.value}))} style={S.inp}/></div>
        <div><label style={S.lbl}>Price/kg (RWF)</label><input type="number" placeholder="2500" value={form.priceKg} onChange={e=>setForm(upd({...form,priceKg:e.target.value}))} style={S.inp}/></div>
        <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Total (RWF)</label><input type="number" placeholder="Auto-calculated" value={form.total} onChange={e=>setForm({...form,total:e.target.value})} style={S.inp}/></div>
      </div>
      <div style={{marginBottom:12}}><label style={S.lbl}>Notes</label><input placeholder="Notes..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={S.inp}/></div>
      <button style={{...S.btn(),width:"100%",padding:12,fontSize:14}} onClick={submit}>Record Sale →</button>
    </div>
  </div>);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
