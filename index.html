/* ─── Financials ─── */
function Fin({feeds,sales,pigs,logs,expenses,incomes,allData}){
  const totalSaleInc=sales.reduce((s,l)=>s+(l.total||0),0);
  const totalOtherInc=incomes.reduce((s,l)=>s+(l.amount||0),0);
  const totalIncome=totalSaleInc+totalOtherInc;
  const totalFeedCost=feeds.reduce((s,l)=>s+(l.cost||0),0);
  const totalOtherExp=expenses.reduce((s,l)=>s+(l.amount||0),0);
  const totalExpense=totalFeedCost+totalOtherExp;
  const profit=totalIncome-totalExpense;
  const roi=totalExpense>0?((profit/totalExpense)*100).toFixed(1):"—";
  const months={};
  [...sales.map(s=>({date:s.date,rev:s.total,cost:0})),...incomes.map(i=>({date:i.date,rev:i.amount,cost:0})),...feeds.map(f=>({date:f.date,rev:0,cost:f.cost})),...expenses.map(e=>({date:e.date,rev:0,cost:e.amount}))].forEach(l=>{const m=l.date&&l.date.slice(0,7);if(!m)return;if(!months[m])months[m]={rev:0,cost:0};months[m].rev+=l.rev;months[m].cost+=l.cost;});
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <div style={S.h1}>Financial Dashboard</div>
      <PDFBtn label="Finance PDF" type="finance" getData={()=>allData} icon="💰" color="#374151"/>
    </div>
    <div style={S.g4}>
      {[{l:"Total Income",v:fmtRWF(totalIncome),c:"#10b981"},{l:"Total Expenses",v:fmtRWF(totalExpense),c:C.red},{l:"Net Profit",v:fmtRWF(profit),c:profit>=0?C.accent:C.red},{l:"ROI",v:roi==="—"?"—":roi+"%",c:C.purple}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c,fontSize:18}}>{s.v}</div></div>
      ))}
    </div>
    <div style={S.g2}>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:"#10b981",marginBottom:10}}>💚 Income Breakdown</div>
        <div style={S.row}><span style={{color:C.muted}}>🏷️ Pig Sales</span><span style={{color:"#10b981",fontWeight:700}}>{fmtRWF(totalSaleInc)}</span></div>
        <div style={S.row}><span style={{color:C.muted}}>💰 Other Income</span><span style={{color:"#10b981",fontWeight:700}}>{fmtRWF(totalOtherInc)}</span></div>
      </div>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:10}}>🔴 Expense Breakdown</div>
        <div style={S.row}><span style={{color:C.muted}}>🌾 Feed Costs</span><span style={{color:C.red,fontWeight:700}}>{fmtRWF(totalFeedCost)}</span></div>
        <div style={S.row}><span style={{color:C.muted}}>📦 Other Expenses</span><span style={{color:C.red,fontWeight:700}}>{fmtRWF(totalOtherExp)}</span></div>
      </div>
    </div>
    <div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>Monthly Summary</div>
      {Object.keys(months).length===0?<div style={{color:C.faint,fontSize:13}}>No data yet.</div>:
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead><tr>{["Month","Income","Expenses","Profit"].map(h=><th key={h} style={{textAlign:"left",color:C.faint,paddingBottom:8,borderBottom:"1px solid "+C.border,fontSize:11}}>{h}</th>)}</tr></thead>
          <tbody>{Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).map(([m,v])=>(
            <tr key={m} style={{borderBottom:"1px solid "+C.elevated}}>
              <td style={{padding:"7px 0",color:C.muted}}>{m}</td>

/* ─── Workers ─── */
function Workers({users,setUsers}){
  const [saving,setSaving]=React.useState(null);
  const [refreshing,setRefreshing]=React.useState(false);
  const [lastCheck,setLastCheck]=React.useState("");
  const pending=users.filter(u=>u.role==="worker"&&!u.approved);
  const approved=users.filter(u=>u.role==="worker"&&u.approved);

  // Auto-refresh every 10 seconds when on this page
  useEffect(()=>{
    refresh();
    const t=setInterval(refresh,10000);
    return()=>clearInterval(t);
  },[]);

  async function refresh(){
    setRefreshing(true);
    try{
      const fresh=await getOnlineUsers();
      if(fresh&&fresh.length>0) setUsers([...fresh]);
      setLastCheck(new Date().toLocaleTimeString());
    }catch(e){}
    setRefreshing(false);
  }

  async function approve(id){
    setSaving(id);
    const updated=users.map(u=>u.id===id?{...u,approved:true}:u);
    setUsers(updated);
    try{await setOnlineUsers(updated);}catch(e){console.error("approve error",e);}
    setSaving(null);
  }
  async function reject(id){
    setSaving(id);
    const updated=users.filter(u=>u.id!==id);
    setUsers(updated);
    try{await setOnlineUsers(updated);}catch(e){console.error("reject error",e);}
    setSaving(null);
  }
  async function removeWorker(id){
    setSaving(id);
    const updated=users.filter(u=>u.id!==id);
    setUsers(updated);
    try{await setOnlineUsers(updated);}catch(e){console.error("remove error",e);}
    setSaving(null);
  }

  return(<div>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
      <div style={S.h1}>Worker Management</div>
      <button onClick={refresh} disabled={refreshing} style={{
        padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",
        background:"rgba(22,163,74,.12)",color:C.accent,fontWeight:700,
        fontSize:12,fontFamily:"inherit",display:"flex",alignItems:"center",gap:6
      }}>
        <span style={refreshing?{display:"inline-block",animation:"spin .8s linear infinite"}:{}}>🔄</span>
        {refreshing?"Checking…":"Refresh"}
      </button>
    </div>
    <div style={{...S.sub,marginBottom:14}}>{approved.length} active · {pending.length} pending · {lastCheck&&"Last checked: "+lastCheck}</div>
    {pending.length>0&&<div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.amber,marginBottom:10}}>⏳ Pending Approval ({pending.length})</div>
      {pending.map(w=><div key={w.id} style={{...S.row,background:"rgba(245,158,11,.05)"}}>
        <div><div style={{fontWeight:600}}>{w.name}</div><div style={{fontSize:11,color:C.faint}}>@{w.username}</div></div>
        <div>
          <button style={S.btn("#166534")} disabled={saving===w.id} onClick={()=>approve(w.id)}>{saving===w.id?"⏳":"✓ Approve"}</button>
          <button style={S.btn("#991b1b")} disabled={saving===w.id} onClick={()=>reject(w.id)}>{saving===w.id?"⏳":"✗ Reject"}</button>
        </div>
      </div>)}
    </div>}
    {pending.length===0&&<div style={{...S.card,textAlign:"center",color:C.faint,fontSize:13}}>✅ No pending approvals.</div>}
    <div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>✅ Active Workers ({approved.length})</div>
      {approved.length===0&&<div style={{color:C.faint,fontSize:13}}>No workers yet.</div>}
      {approved.map(w=><div key={w.id} style={S.row}>
        <div><div style={{fontWeight:600}}>{w.name}</div><div style={{fontSize:11,color:C.faint}}>@{w.username}</div></div>
        <button style={{...S.btn(C.red),padding:"5px 11px",fontSize:11}} disabled={saving===w.id} onClick={()=>removeWorker(w.id)}>{saving===w.id?"⏳":"Remove"}</button>
      </div>)}
    </div>
  </div>);
}

        <div><label style={S.lbl}>Weight (kg)</label><input type="number" placeholder="80" value={form.weight} onChange={e=>setForm(upd({...form,weight:e.target.value}))} style={S.inp}/></div>
        <div><label style={S.lbl}>Price/kg (RWF)</label><input type="number" placeholder="2500" value={form.priceKg} onChange={e=>setForm(upd({...form,priceKg:e.target.value}))} style={S.inp}/></div>
        <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Total (RWF)</label><input type="number" placeholder="Auto-calculated" value={form.total} onChange={e=>setForm({...form,total:e.target.value})} style={S.inp}/></div>
      </div>
      <div style={{marginBottom:12}}><label style={S.lbl}>Notes</label><input placeholder="Notes..." value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={S.inp}/></div>
      <button style={{...S.btn(),width:"100%",padding:12,fontSize:14}} onClick={submit}>Record Sale →</button>
    </div>
  </div>);
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
