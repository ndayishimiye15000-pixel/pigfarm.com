const JBIN_USERS_ID = "69c3ac3faa77b81da9196648";

const JBIN_DATA_URL = "https://api.jsonbin.io/v3/b/"+JBIN_DATA_ID;

let _saveQueue=Promise.resolve();
let _latestData=null;

async function getOnlineUsers(){
  try{
    const r=await fetch(JBIN_USERS_URL+"/latest",{headers:{"X-Master-Key":JBIN_KEY,"X-Bin-Meta":"false"}});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    return d&&d.list?d.list:null;
  }catch(e){console.error("getUsers",e);return null;}
}
async function setOnlineUsers(users){
  try{
    const r=await fetch(JBIN_USERS_URL,{method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":JBIN_KEY},
      body:JSON.stringify({list:users,updatedAt:now()})});
    if(!r.ok)throw new Error(r.status);
  }catch(e){console.error("setUsers",e);throw e;}
}
async function getOnlineData(){
  try{
    const r=await fetch(JBIN_DATA_URL+"/latest",{headers:{"X-Master-Key":JBIN_KEY,"X-Bin-Meta":"false"}});
    if(!r.ok)return null;
    const d=await r.json();
    if(d)_latestData={...d};
    return d||null;
  }catch(e){console.error("getData",e);return null;}
}
function setOnlineData(patch){
  _latestData={...(_latestData||{}),...patch,updatedAt:now()};
  _saveQueue=_saveQueue.then(async()=>{
    try{
      const r=await fetch(JBIN_DATA_URL,{method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":JBIN_KEY},
        body:JSON.stringify(_latestData)});
      if(!r.ok)console.error("setData failed",r.status);
    }catch(e){console.error("setData",e);}
  });
  return _saveQueue;
}
function dsSet(key,val){return setOnlineData({[key]:val});}

/* ═══════════════════════════ QUESTION TYPE HELPERS ═══════════════════════════ */
// Types that can be auto-graded
const AUTO_TYPES=["mcq","fill","match","tf"];
// Types that need manual/AI grading
const MANUAL_TYPES=["short","essay"];

function isAutoGradable(type){return AUTO_TYPES.includes(type);}
function isManualType(type){return MANUAL_TYPES.includes(type);}

// Auto-score only the auto-gradable questions
function calcAutoScore(answers,questions){
  let earned=0,total=0;
  (questions||[]).forEach(q=>{
    if(!isAutoGradable(q.type))return;
    total+=q.marks||1;
    const a=answers[q.id];
    if(!a)return;
    if(q.type==="mcq"||q.type==="fill"){
      if((a||"").trim().toLowerCase()===(q.answer||"").trim().toLowerCase())earned+=q.marks||1;
    }else if(q.type==="tf"){
      if((a||"").trim().toLowerCase()===(q.answer||"").trim().toLowerCase())earned+=q.marks||1;
    }else if(q.type==="match"){
      let pts=0;
      (q.pairs||[]).forEach(p=>{
        if((a[p.id]||"").trim().toLowerCase()===(p.right||"").trim().toLowerCase())pts+=1;
      });
      earned+=Math.round(((pts/(q.pairs?.length||1))*(q.marks||1)));
    }
  });
  return{earned,total};
}

function calcTotalMarks(questions){
  return (questions||[]).reduce((s,q)=>s+(parseInt(q.marks)||1),0);
}

function examHasManual(exam){
  return (exam.questions||[]).some(q=>isManualType(q.type));
}

function getGrade(pct){
  if(pct>=80)return{g:"A",l:"Distinction",c:C.green};
  if(pct>=70)return{g:"B",l:"Merit",c:C.blue};
  if(pct>=60)return{g:"C",l:"Credit",c:C.accent};
  if(pct>=50)return{g:"D",l:"Pass",c:C.amber};
  return{g:"F",l:"Fail",c:C.red};
}

function Spinner(){return<span className="spin" style={S.loader}/>;}

/* ═══════════════════════════ TOAST ═══════════════════════════ */
function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3000);return()=>clearTimeout(t);},[]);
  const bg=type==="ok"?C.green:type==="err"?C.red:C.accent;
  return<div className="fade-in" style={{position:"fixed",top:16,right:16,zIndex:9999,
    background:bg,color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:600,
    boxShadow:"0 4px 20px rgba(0,0,0,.18)",maxWidth:320}}>{msg}</div>;
}
function useToast(){
  const[t,setT]=useState(null);
  const show=(msg,type="ok")=>setT({msg,type,k:uid()});
  const el=t&&<Toast key={t.k} msg={t.msg} type={t.type} onDone={()=>setT(null)}/>;
  return[show,el];
}

/* ═══════════════════════════ LOGIN PAGE ═══════════════════════════ */
function LoginPage({onLogin,users,setUsers}){
  const[form,setForm]=useState({username:"",password:""});
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const[reg,setReg]=useState(false);
  const[regForm,setRegForm]=useState({name:"",username:"",password:"",role:"student",class:"",subject:""});

  function doLogin(){
    setLoading(true);setErr("");
    setTimeout(()=>{
      const u=users.find(x=>x.username===form.username&&x.password===form.password);
      if(!u){setErr("Invalid username or password.");setLoading(false);return;}
      if(!u.approved){setErr("Your account is pending admin approval.");setLoading(false);return;}
      onLogin(u);setLoading(false);
    },600);
  }
  async function doRegister(){
    if(!regForm.name||!regForm.username||!regForm.password){setErr("Fill all fields.");return;}
    if(users.find(u=>u.username===regForm.username)){setErr("Username already taken.");return;}
    const newUser={id:uid(),name:regForm.name,username:regForm.username,password:regForm.password,
      role:regForm.role,approved:false,
      ...(regForm.role==="student"?{class:regForm.class,regNo:"REG/"+uid().slice(0,6).toUpperCase()}:{}),
      ...(regForm.role==="teacher"?{subject:regForm.subject}:{}),
      createdAt:toDay()};
    const updated=[...(users||[]),newUser];
    await setOnlineUsers(updated);
    setUsers(updated);
    setErr("Registration submitted! Wait for admin approval.");
    setReg(false);
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:42,marginBottom:8}}>🎓</div>
          <div style={{fontSize:28,fontWeight:900,color:C.accent,letterSpacing:-1}}>EduIQ</div>
          <div style={{fontSize:12,color:C.muted,letterSpacing:2,textTransform:"uppercase"}}>Online School System</div>
        </div>
        <div style={{...S.card,padding:24}}>
          {!reg?(
            <>
              <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>Sign In</div>
              {[["Username","username","text"],["Password","password","password"]].map(([l,k,t])=>(
                <div key={k} style={{marginBottom:12}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{l}</div>
                  <input type={t} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}
                    placeholder={"Enter "+l.toLowerCase()} onKeyDown={e=>e.key==="Enter"&&doLogin()}/>
                </div>
              ))}
              {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,padding:"8px 12px",background:C.redBg,borderRadius:7}}>{err}</div>}
              <button style={{...S.btn(),width:"100%",padding:"11px"}} onClick={doLogin} disabled={loading}>
                {loading?<><Spinner/> Signing in…</>:"Sign In →"}
              </button>
              <div style={{textAlign:"center",marginTop:14,fontSize:12,color:C.muted}}>
                No account?{" "}
                <button onClick={()=>{setReg(true);setErr("");}} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontWeight:700,fontFamily:"inherit",fontSize:12}}>Register</button>
              </div>
              <div style={{marginTop:16,padding:"10px 12px",background:C.elevated,borderRadius:8,border:"1px solid "+C.border}}>
                <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6}}>DEMO ACCOUNTS</div>
                {[["admin","admin123","Admin"],["teacher1","teach123","Teacher"],["student1","pass123","Student"]].map(([u,p,r])=>(
                  <div key={u} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                    <span style={{fontWeight:600,color:C.text}}>{r}</span>
                    <span style={{color:C.muted}}>{u} / {p}</span>
                  </div>
                ))}
              </div>
            </>
          ):(
            <>
              <div style={{fontWeight:700,fontSize:15,marginBottom:16}}>Create Account</div>
              {[["Full Name","name","text"],["Username","username","text"],["Password","password","password"]].map(([l,k,t])=>(
                <div key={k} style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{l}</div>
                  <input type={t} value={regForm[k]} onChange={e=>setRegForm({...regForm,[k]:e.target.value})} placeholder={l}/>
                </div>
              ))}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Role</div>
                <select value={regForm.role} onChange={e=>setRegForm({...regForm,role:e.target.value})}>
                  <option value="student">Student</option>
                  <option value="teacher">Teacher</option>
                </select>
              </div>
              {regForm.role==="student"&&(
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Class</div>
                  <select value={regForm.class} onChange={e=>setRegForm({...regForm,class:e.target.value})}>
                    <option value="">Select class…</option>
                    {["S1","S2","S3","S4","S5","S6"].map(c=><option key={c} value={c}>{c}</option>)}
                  </select>

              {regForm.role==="teacher"&&(
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Subject</div>
                  <input value={regForm.subject} onChange={e=>setRegForm({...regForm,subject:e.target.value})} placeholder="e.g. Mathematics"/>

              <button onClick={()=>{setReg(false);setErr("");}} style={{...S.btn(C.elevated,C.muted),width:"100%",border:"1px solid "+C.border}}>← Back to Login</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════ ADMIN DASHBOARD ═══════════════════════════ */
function AdminDash({user,data,setData,users,setUsers,toast,onLogout}){
  const[tab,setTab]=useState("overview");

  const teachers=users.filter(u=>u.role==="teacher");

    const updated=users.map(u=>u.id===uid?{...u,approved:true}:u);
    setUsers(updated);await setOnlineUsers(updated);toast("User approved ✓");

  async function removeUser(uid){
    if(!confirm("Remove this user?"))return;
    const updated=users.filter(u=>u.id!==uid);
    setUsers(updated);await setOnlineUsers(updated);toast("User removed");

    const ann={id:uid(),text,target,author:user.name,date:toDay(),createdAt:now()};

}

/* ═══════════════════════════ GRADING PANEL ═══════════════════════════ */
function GradingPanel({user,data,setData,myExams,toast}){
  const[selExam,setSelExam]=useState("");
  const[gradingSub,setGradingSub]=useState(null);

  const allSubs=data.submissions||[];
  const pendingSubs=allSubs.filter(s=>{
    const exam=myExams.find(e=>e.id===s.examId);
    return exam&&s.status==="pending";
  });

  if(gradingSub){
    const exam=myExams.find(e=>e.id===gradingSub.examId);
    return<MarkingInterface
      sub={gradingSub} exam={exam} data={data} setData={setData} toast={toast}
      onDone={()=>setGradingSub(null)}/>;
  }

  return(
    <div>
      <div style={{...S.card,background:"linear-gradient(135deg,"+C.amber+"15,"+C.amber+"05)",border:"1.5px solid "+C.amber+"44"}}>

      </div>

      {filteredSubs.length===0&&(
        <div style={{...S.card,textAlign:"center",color:C.faint,padding:40}}>
          <div style={{fontSize:32,marginBottom:8}}>✅</div>
          <div style={{fontWeight:600}}>All caught up!</div>
          <div style={{fontSize:12,marginTop:4}}>No pending submissions to grade.</div>
        </div>
      )}

      {filteredSubs.map(s=>{
        const exam=myExams.find(e=>e.id===s.examId);
        const manualQs=(exam?.questions||[]).filter(q=>isManualType(q.type));
        return(
          <div key={s.id} style={S.card}>

                <div style={{fontWeight:700,fontSize:14}}>{s.studentName}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.studentClass||"—"} · {exam?.title||"Exam"}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:1}}>Submitted: {s.submittedAt?.slice(0,10)}</div>
                {s.autoScored&&(
                  <div style={{fontSize:11,color:C.blue,marginTop:4}}>
                    Auto-graded: {s.autoScored.earned}/{s.autoScored.total} marks
                    {manualQs.length>0&&<span style={{color:C.amber}}> · {manualQs.length} question{manualQs.length>1?"s":""} need manual grading</span>}
                  </div>
                )}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                <span style={{...S.badge(C.amber,C.amberBg)}}>⏳ Pending</span>
                <button style={{...S.btn(),fontSize:12,padding:"6px 14px"}} onClick={()=>setGradingSub(s)}>Grade →</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════ MARKING INTERFACE ═══════════════════════════ */
function MarkingInterface({sub,exam,data,setData,toast,onDone}){
  const[manualScores,setManualScores]=useState(sub.manualScores||{});
  const[feedback,setFeedback]=useState(sub.feedback||{});
  const[aiLoading,setAiLoading]=useState({});
  const[apiKey,setApiKey]=useState(localStorage.getItem("eduiq_ai_key")||"");
  const[showKeyInput,setShowKeyInput]=useState(false);
  const[publishing,setPublishing]=useState(false);

  const autoQs=(exam?.questions||[]).filter(q=>isAutoGradable(q.type));
  const manualQs=(exam?.questions||[]).filter(q=>isManualType(q.type));

  // Total auto score
  const autoEarned=sub.autoScored?.earned||0;
  const autoTotal=sub.autoScored?.total||0;

  // Total manual score entered so far
  const manualEarned=manualQs.reduce((s,q)=>s+(parseInt(manualScores[q.id])||0),0);
  const manualTotal=manualQs.reduce((s,q)=>s+(q.marks||1),0);

  const grandTotal=calcTotalMarks(exam?.questions||[]);
  const grandEarned=autoEarned+manualEarned;
  const pct=grandTotal>0?Math.round((grandEarned/grandTotal)*100):0;
  const gr=getGrade(pct);

  async function aiMark(q){
    if(!apiKey){setShowKeyInput(true);toast("Please enter your Anthropic API key","err");return;}
    setAiLoading(p=>({...p,[q.id]:true}));
    const studentAns=sub.answers[q.id]||"";
    try{
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
        body:JSON.stringify({
          model:"claude-opus-4-5",
          max_tokens:300,
          messages:[{role:"user",content:`You are grading a student's answer. Respond ONLY with JSON.
Question: ${q.text}
Maximum marks: ${q.marks}
Expected answer/keywords: ${q.answer||"(open-ended, use your judgment)"}
Student's answer: ${studentAns}
Evaluate and respond ONLY with this JSON (no preamble): {"score":number,"feedback":"brief 1-2 sentence feedback"}`}]
        })
      });
      const d=await resp.json();
      const raw=d.content?.[0]?.text||"{}";
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      const score=Math.min(q.marks,Math.max(0,parseInt(parsed.score)||0));
      setManualScores(p=>({...p,[q.id]:score}));
      setFeedback(p=>({...p,[q.id]:parsed.feedback||""}));
      toast("AI marked Q: "+score+"/"+q.marks+" marks ✓");
    }catch(e){
      toast("AI marking failed. Check API key or answer.","err");
      console.error(e);
    }
    setAiLoading(p=>({...p,[q.id]:false}));
  }

  async function publishGrade(){
    // Check all manual questions have been scored
    const unscored=manualQs.filter(q=>manualScores[q.id]===undefined||manualScores[q.id]==="");
    if(unscored.length>0){
      toast(`Please score all ${unscored.length} open-ended question(s) before publishing.`,"err");
      return;
    }
    setPublishing(true);
    const updatedSub={
      ...sub,
      manualScores,
      feedback,
      earned:grandEarned,
      total:grandTotal,
      pct,
      status:"graded",
      gradedAt:now(),
      gradedBy:"{teacher}",
    };
    const updatedSubs=(data.submissions||[]).map(s=>s.id===sub.id?updatedSub:s);
    setData(d=>({...d,submissions:updatedSubs}));
    await dsSet("submissions",updatedSubs);
    toast("Grade published! Student can now see their results ✓");
    setPublishing(false);
    onDone();
  }

  return(
    <div className="fade-in">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={onDone} style={{...S.btn(C.elevated,C.muted),border:"1px solid "+C.border,fontSize:12,padding:"6px 12px"}}>← Back</button>
        <div>
          <div style={{fontWeight:800,fontSize:15}}>Grading: {sub.studentName}</div>
          <div style={{fontSize:11,color:C.muted}}>{exam?.title} · {sub.studentClass}</div>
        </div>
      </div>

      {/* Score summary */}
      <div style={{...S.card,background:"linear-gradient(135deg,"+gr.c+"12,"+gr.c+"05)",border:"1.5px solid "+gr.c+"44"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:C.muted,marginBottom:2}}>RUNNING TOTAL</div>
            <div style={{fontSize:28,fontWeight:900,color:gr.c}}>{grandEarned} / {grandTotal}</div>
            <div style={{fontSize:13,color:C.muted}}>{pct}% — {gr.g} ({gr.l})</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:C.muted}}>Auto: {autoEarned}/{autoTotal}</div>
            <div style={{fontSize:11,color:C.muted}}>Manual: {manualEarned}/{manualTotal}</div>
          </div>
        </div>
        <div style={{marginTop:10,height:6,background:C.border,borderRadius:4}}>
          <div style={{height:"100%",width:pct+"%",background:gr.c,borderRadius:4,transition:"width .3s"}}/>
        </div>
      </div>

      {/* AI API Key setting */}
      {(showKeyInput||!apiKey)&&manualQs.length>0&&(
        <div style={{...S.card,border:"1px solid "+C.purple+"44",background:C.purpleBg}}>
          <div style={{fontWeight:700,fontSize:13,color:C.purple,marginBottom:6}}>🤖 AI Marking — Anthropic API Key</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Enter your Anthropic API key to use AI for marking open-ended questions. It's saved locally in your browser.</div>
          <div style={{display:"flex",gap:8}}>
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
              placeholder="sk-ant-..." style={{flex:1}}/>
            <button style={{...S.btn(C.purple),fontSize:12,padding:"6px 14px"}}
              onClick={()=>{localStorage.setItem("eduiq_ai_key",apiKey);setShowKeyInput(false);toast("API key saved ✓");}}>Save</button>
          </div>
        </div>
      )}

      {/* Auto-graded questions */}
      {autoQs.length>0&&(
        <div style={S.card}>
          <div style={{fontWeight:700,marginBottom:2}}>✅ Auto-Graded Questions</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:12}}>These were automatically scored by the system.</div>
          {autoQs.map((q,i)=>{
            const a=sub.answers[q.id];
            let earned=0;
            if(q.type==="mcq"||q.type==="fill"){
              if((a||"").trim().toLowerCase()===(q.answer||"").trim().toLowerCase())earned=q.marks||1;
            }else if(q.type==="tf"){
              if((a||"").trim().toLowerCase()===(q.answer||"").trim().toLowerCase())earned=q.marks||1;
            }else if(q.type==="match"){
              let pts=0;(q.pairs||[]).forEach(p=>{if((a?.[p.id]||"").trim().toLowerCase()===(p.right||"").trim().toLowerCase())pts+=1;});
              earned=Math.round(((pts/(q.pairs?.length||1))*(q.marks||1)));
            }
            const correct=earned===(q.marks||1);
            return(
              <div key={q.id} style={{padding:"10px 12px",borderRadius:9,marginBottom:8,
                background:correct?C.greenBg:C.redBg,border:"1px solid "+(correct?C.green:C.red)+"33"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>Q{i+1}. {q.text} <span style={{...S.badge(C.muted,"#f1f5f9"),fontSize:10}}>{q.type==="tf"?"True/False":q.type.toUpperCase()}</span></div>
                    <div style={{fontSize:12,color:C.muted}}>
                      Student answered: <strong>{typeof a==="object"?Object.entries(a||{}).map(([k,v])=>v).join(", "):a||"—"}</strong>
                    </div>
                    {q.type!=="match"&&<div style={{fontSize:12,color:C.green}}>Correct answer: <strong>{q.answer}</strong></div>}
                  </div>
                  <span style={{...S.badge(correct?C.green:C.red,correct?C.greenBg:C.redBg),marginLeft:12,whiteSpace:"nowrap"}}>{earned}/{q.marks||1} mk</span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Manual grading questions */}
      {manualQs.length>0&&(
        <div style={S.card}>
          <div style={{fontWeight:700,marginBottom:2}}>📝 Open-Ended Questions</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:12}}>Assign marks manually or use AI to assist. You can adjust AI suggestions.</div>
          {manualQs.map((q,i)=>{
            const studentAns=sub.answers[q.id]||"";
            const scored=manualScores[q.id]!==undefined&&manualScores[q.id]!=="";
            return(
              <div key={q.id} style={{padding:"12px 14px",borderRadius:10,marginBottom:12,
                background:scored?C.greenBg:"#fff",border:"1.5px solid "+(scored?C.green:C.border)}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13}}>
                      Q{autoQs.length+i+1}. {q.text}
                      <span style={{...S.badge(q.type==="essay"?C.purple:C.teal,q.type==="essay"?C.purpleBg:C.tealBg),marginLeft:8,fontSize:10}}>{q.type==="essay"?"Essay":"Short Answer"}</span>
                    </div>
                    {q.answer&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Expected: {q.answer}</div>}
                  </div>
                  <span style={{...S.badge(C.muted,"#f1f5f9"),marginLeft:8,whiteSpace:"nowrap"}}>/{q.marks||1} mk</span>
                </div>

                {/* Student answer */}
                <div style={{padding:"10px 12px",background:C.elevated,borderRadius:8,border:"1px solid "+C.border,marginBottom:10}}>
                  <div style={{fontSize:10,color:C.faint,marginBottom:4,textTransform:"uppercase",letterSpacing:".5px"}}>Student's Answer</div>
                  <div style={{fontSize:13,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.6}}>
                    {studentAns||<span style={{color:C.faint,fontStyle:"italic"}}>No answer provided</span>}
                  </div>
                </div>

                {/* AI feedback display */}
                {feedback[q.id]&&(
                  <div style={{padding:"8px 12px",background:C.purpleBg,borderRadius:8,border:"1px solid "+C.purple+"33",marginBottom:10}}>
                    <div style={{fontSize:10,color:C.purple,fontWeight:700,marginBottom:3}}>🤖 AI FEEDBACK</div>
                    <div style={{fontSize:12,color:C.text}}>{feedback[q.id]}</div>
                  </div>
                )}

                {/* Scoring row */}
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flex:1}}>
                    <div style={{fontSize:12,color:C.muted,whiteSpace:"nowrap"}}>Marks awarded:</div>
                    <input type="number" min={0} max={q.marks||1}
                      value={manualScores[q.id]??""} 
                      onChange={e=>setManualScores(p=>({...p,[q.id]:e.target.value}))}
                      style={{width:70}} placeholder="0"/>
                    <div style={{fontSize:12,color:C.muted}}>/ {q.marks||1}</div>
                  </div>
                  <button
                    style={{...S.btn(C.purpleBg,C.purple),fontSize:12,padding:"6px 12px",border:"1px solid "+C.purple+"44",display:"flex",alignItems:"center",gap:5}}
                    onClick={()=>aiMark(q)} disabled={aiLoading[q.id]}>
                    {aiLoading[q.id]?<><Spinner/> AI Marking…</>:"🤖 AI Mark"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Publish button */}
      <div style={{...S.card,border:"1.5px solid "+C.green+"44",background:C.greenBg}}>
        <div style={{fontWeight:700,fontSize:14,color:C.green,marginBottom:6}}>Ready to Publish?</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:14}}>
          Once published, <strong>{sub.studentName}</strong> will see their final grade: <strong style={{color:gr.c}}>{pct}% — {gr.g} ({gr.l})</strong>. This action cannot be undone.
        </div>
        {manualQs.length>0&&apiKey&&(
          <div style={{marginBottom:10}}>
            <button style={{...S.btn(C.purpleBg,C.purple),width:"100%",marginBottom:8,border:"1px solid "+C.purple+"44",fontSize:12}}
              onClick={async()=>{
                for(const q of manualQs){
                  if(manualScores[q.id]===undefined||manualScores[q.id]===""){
                    await aiMark(q);
                  }
                }
              }}>
              🤖 AI Mark All Remaining Open-Ended Questions
            </button>
          </div>
        )}
        <button style={{...S.btn(C.green),width:"100%",padding:"12px",fontSize:14}} onClick={publishGrade} disabled={publishing}>
          {publishing?<><Spinner/> Publishing…</>:"🚀 Publish Grade to Student"}
        </button>
        {manualQs.length>0&&!apiKey&&(
          <button style={{...S.btn(C.elevated,C.muted),width:"100%",marginTop:8,border:"1px solid "+C.border,fontSize:12}} onClick={()=>setShowKeyInput(true)}>
            🔑 Set AI API Key for Auto-Marking
          </button>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════ CREATE EXAM ═══════════════════════════ */
const QTYPES=[
  {v:"mcq",l:"📋 Multiple Choice"},
  {v:"tf",l:"✅ True / False"},
  {v:"fill",l:"✏️ Fill in Blank"},
  {v:"match",l:"🔗 Matching"},
  {v:"short",l:"📝 Short Answer"},
  {v:"essay",l:"📄 Essay / Long Answer"},
];

function CreateExam({user,data,setData,toast,onDone}){
  const[step,setStep]=useState(1);
  const[meta,setMeta]=useState({title:"",subject:user.subject||"",class:"",instructions:"",timeLimit:"",dueDate:""});
  const[questions,setQuestions]=useState([]);
  const[adding,setAdding]=useState(null);

  function addQ(q){
    setQuestions(prev=>[...prev,{...q,id:uid()}]);
    setAdding(null);
    toast("Question added ✓");
  }

  async function publish(){
    if(!meta.title){toast("Add a title","err");return;}
    if(questions.length===0){toast("Add at least 1 question","err");return;}
    const exam={
      id:uid(),...meta,
      teacherId:user.id,teacherUsername:user.username,teacherName:user.name,
      questions,status:"published",createdAt:now(),
      totalMarks:calcTotalMarks(questions),
    };
    const updated=[...(data.exams||[]),exam];
    setData(d=>({...d,exams:updated}));
    dsSet("exams",updated);
    toast("Exam published ✓");
    onDone();
  }

  const typeLabel={mcq:"MCQ",tf:"True/False",fill:"Fill",match:"Match",short:"Short Ans.",essay:"Essay"};
  const typeColor={mcq:C.accent,tf:C.green,fill:C.blue,match:C.amber,short:C.teal,essay:C.purple};

  return(
    <div>
      <div style={{display:"flex",gap:4,marginBottom:16}}>
        {[1,2,3].map(n=>(

/* ═══════════════════════════ QUESTION BUILDER ═══════════════════════════ */
function QuestionBuilder({type,onAdd,onCancel}){
  const[text,setText]=useState("");
  const[marks,setMarks]=useState(1);
  const[answer,setAnswer]=useState("");
  const[options,setOptions]=useState(["","","",""]);
  const[pairs,setPairs]=useState([{id:uid(),left:"",right:""},{id:uid(),left:"",right:""}]);

  const typeLabels={mcq:"Multiple Choice",tf:"True / False",fill:"Fill in Blank",match:"Matching",short:"Short Answer",essay:"Essay / Long Answer"};
  const isOpenEnded=type==="short"||type==="essay";

  function submit(){
    if(!text.trim())return;
    const base={type,text:text.trim(),marks:parseInt(marks)||1};
    if(type==="mcq") onAdd({...base,options:options.filter(Boolean),answer});
    else if(type==="tf") onAdd({...base,answer});
    else if(type==="fill") onAdd({...base,answer});
    else if(type==="short"||type==="essay") onAdd({...base,answer}); // answer = expected keywords/notes
    else if(type==="match") onAdd({...base,pairs,answer:""});
  }

  return(
    <div style={{marginTop:12,padding:"12px 14px",background:C.accentLight,borderRadius:10,border:"1px dashed "+C.borderAccent}}>
      <div style={{fontWeight:700,fontSize:13,marginBottom:10,color:C.accent}}>{typeLabels[type]||type}</div>
      <div style={{marginBottom:8}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Question Text</div>
        <textarea value={text} onChange={e=>setText(e.target.value)} rows={2} placeholder="Enter question…" style={{...S.inp,resize:"vertical"}}/>
      </div>

      {type==="mcq"&&(
        <>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Options</div>
            {options.map((o,i)=>(
              <div key={i} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
                <span style={{fontSize:11,color:C.muted,width:16}}>{String.fromCharCode(65+i)}.</span>
                <input value={o} onChange={e=>{const n=[...options];n[i]=e.target.value;setOptions(n);}} placeholder={`Option ${String.fromCharCode(65+i)}`}/>
              </div>
            ))}
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Correct Answer</div>
            <select value={answer} onChange={e=>setAnswer(e.target.value)}>
              <option value="">Select correct option…</option>
              {options.filter(Boolean).map(o=><option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        </>
      )}

      {type==="tf"&&(
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Correct Answer</div>
          <select value={answer} onChange={e=>setAnswer(e.target.value)}>
            <option value="">Select…</option>
            <option value="True">True</option>
            <option value="False">False</option>
          </select>
        </div>
      )}

      {type==="fill"&&(
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Correct Answer</div>
          <input value={answer} onChange={e=>setAnswer(e.target.value)} placeholder="Exact answer"/>
        </div>
      )}

      {isOpenEnded&&(
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Expected Answer / Marking Notes <span style={{color:C.amber}}>(for teacher & AI reference)</span></div>
          <textarea value={answer} onChange={e=>setAnswer(e.target.value)} rows={2}
            placeholder="Key points, keywords, or model answer…" style={{...S.inp,resize:"vertical"}}/>
          <div style={{fontSize:10,color:C.amber,marginTop:4}}>⚠️ This question will require manual or AI marking. Students won't see results until you publish grades.</div>
        </div>
      )}

      {type==="match"&&(
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Matching Pairs</div>
          {pairs.map((p,i)=>(
            <div key={p.id} style={{display:"flex",gap:6,marginBottom:5,alignItems:"center"}}>
              <input value={p.left} onChange={e=>{const n=[...pairs];n[i]={...n[i],left:e.target.value};setPairs(n);}} placeholder="Left item" style={{flex:1}}/>
              <span style={{color:C.muted,fontSize:13}}>↔</span>
              <input value={p.right} onChange={e=>{const n=[...pairs];n[i]={...n[i],right:e.target.value};setPairs(n);}} placeholder="Right item" style={{flex:1}}/>
            </div>
          ))}
          <button onClick={()=>setPairs(p=>[...p,{id:uid(),left:"",right:""}])}
            style={{...S.btn(C.elevated,C.accent),fontSize:11,border:"1px solid "+C.borderAccent}}>+ Add Pair</button>
        </div>
      )}

      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Marks</div>
        <input type="number" value={marks} onChange={e=>setMarks(e.target.value)} style={{width:80}}/>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button style={{...S.btn(),flex:2}} onClick={submit}>✓ Add Question</button>
        <button style={{...S.btn(C.elevated,C.muted),flex:1,border:"1px solid "+C.border}} onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

/* ─── Exam List (Teacher) ─── */
function ExamList({exams,data,setData,toast,isTeacher}){
  async function deleteExam(id){
    if(!confirm("Delete this exam?"))return;
    const updated=(data.exams||[]).filter(e=>e.id!==id);
    setData(d=>({...d,exams:updated}));
    dsSet("exams",updated);
    toast("Exam deleted");
  }
  if(exams.length===0)return<div style={{...S.card,textAlign:"center",color:C.faint,padding:40}}>No exams yet. Create your first exam!</div>;
  return(
    <div>
      {exams.map(exam=>{
        const subs=(data.submissions||[]).filter(s=>s.examId===exam.id);
        const gradedSubs=subs.filter(s=>s.status==="graded");
        const pendingSubs=subs.filter(s=>s.status==="pending");
        const avg=gradedSubs.length>0?Math.round(gradedSubs.reduce((s,sub)=>s+(sub.pct||0),0)/gradedSubs.length):null;
        return(
          <div key={exam.id} style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14}}>{exam.title}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>{exam.subject} · {exam.class||"All"} · {exam.questions?.length||0} Qs · {exam.totalMarks} marks</div>
                {exam.dueDate&&<div style={{fontSize:11,color:C.amber,marginTop:2}}>Due: {exam.dueDate}</div>}
                <div style={{marginTop:4,display:"flex",gap:6,flexWrap:"wrap"}}>
                  {examHasManual(exam)&&<span style={{...S.badge(C.purple,C.purpleBg),fontSize:10}}>📝 Has Open-Ended</span>}
                  {exam.questions?.some(q=>q.type==="tf")&&<span style={{...S.badge(C.green,C.greenBg),fontSize:10}}>✅ Has T/F</span>}
                </div>
              </div>
              <div style={{textAlign:"right",display:"flex",flexDirection:"column",gap:4}}>
                {pendingSubs.length>0&&<span style={{...S.badge(C.amber,C.amberBg)}}>⏳ {pendingSubs.length} pending</span>}
                <span style={{...S.badge(C.green,C.greenBg)}}>{gradedSubs.length} graded</span>
                {avg!==null&&<div style={{fontSize:11,color:C.muted}}>Avg: {avg}%</div>}
              </div>
            </div>
            {isTeacher&&(
              <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid "+C.border,display:"flex",gap:8}}>
                <button style={{...S.btn(C.redBg,C.red),fontSize:11,padding:"4px 12px",border:"1px solid "+C.red+"33"}} onClick={()=>deleteExam(exam.id)}>Delete</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

      )}

      {tab==="results"&&<StudentResults submissions={mySubmissions} data={data}/>}
      {tab==="resources"&&<ResourcesPanel data={data} isStudent/>}
    </div>
  );
}

/* ═══════════════════════════ EXAM INTERFACE ═══════════════════════════ */
function ExamInterface({exam,user,data,setData,toast,onDone}){
  const[answers,setAnswers]=useState({});
  const[submitted,setSubmitted]=useState(false);
  const[timeLeft,setTimeLeft]=useState(exam.timeLimit?parseInt(exam.timeLimit)*60:null);
  const[current,setCurrent]=useState(0);

  useEffect(()=>{
    if(!timeLeft||submitted)return;
    const t=setInterval(()=>{
      setTimeLeft(prev=>{
        if(prev<=1){clearInterval(t);submit(true);return 0;}
        return prev-1;
      });
    },1000);
    return()=>clearInterval(t);
  },[submitted]);

  async function submit(auto=false){
    if(submitted)return;
    // Calculate auto scores
    const autoScore=calcAutoScore(answers,exam.questions);
    const totalMarks=calcTotalMarks(exam.questions);
    const hasManual=examHasManual(exam);

    const sub={
      id:uid(),examId:exam.id,
      studentId:user.id,studentUsername:user.username,studentName:user.name,
      studentClass:user.class||"",
      answers,
      autoScored:{earned:autoScore.earned,total:autoScore.total},
      manualScores:{},
      feedback:{},
      // If no manual questions, auto-grade immediately
      status:hasManual?"pending":"graded",
      earned:hasManual?null:autoScore.earned,
      total:totalMarks,
      pct:hasManual?null:autoScore.total>0?Math.round((autoScore.earned/totalMarks)*100):0,
      submittedAt:now(),
      gradedAt:hasManual?null:now(),
      auto:!!auto,
    };
    const updated=[...(data.submissions||[]),sub];
    setData(d=>({...d,submissions:updated}));
    await dsSet("submissions",updated);
    setSubmitted(true);
    toast(auto?"Time up! Auto-submitted":"Exam submitted ✓");
  }

  const q=exam.questions[current];
  const total=exam.questions.length;
  const answered=Object.keys(answers).length;
  const pct=Math.round((answered/total)*100);
  const hasManual=examHasManual(exam);

  if(submitted){
    return(
      <div className="fade-in">
        <div style={{...S.card,textAlign:"center",padding:32,
          border:hasManual?"2px solid "+C.purple+"44":"2px solid "+C.green+"44",
          background:hasManual?C.purpleBg:C.greenBg}}>
          <div style={{fontSize:48,marginBottom:12}}>{hasManual?"📬":"🎉"}</div>
          <div style={{fontSize:22,fontWeight:900,color:hasManual?C.purple:C.green,marginBottom:8}}>
            {hasManual?"Exam Submitted!":"Exam Submitted!"}
          </div>
          {hasManual?(
            <>
              <div style={{fontSize:14,color:C.text,marginBottom:8,fontWeight:600}}>Your exam has been sent to your teacher for review.</div>
              <div style={{fontSize:12,color:C.muted,marginBottom:20,lineHeight:1.7}}>
                This exam includes open-ended questions that need to be marked by your teacher.<br/>
                You will be able to see your results once your teacher publishes your grade.<br/>
                Check your <strong>Results</strong> tab later.
              </div>
              <div style={{...S.badge(C.purple,C.purpleBg),padding:"6px 18px",fontSize:12}}>⏳ Awaiting Teacher Review</div>
            </>
          ):(
            <>
              <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Your exam has been automatically graded. Check your results!</div>
              <div style={{...S.badge(C.green,C.greenBg),padding:"6px 18px",fontSize:12}}>✅ Auto-Graded</div>
            </>
          )}
          <div style={{marginTop:24}}>
            <button style={{...S.btn(),padding:"11px 32px"}} onClick={onDone}>← Back to Dashboard</button>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div className="fade-in">
      <div style={{...S.card,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:800,fontSize:15}}>{exam.title}</div>
            <div style={{fontSize:11,color:C.muted}}>{exam.subject} · Question {current+1} of {total}</div>
          </div>
          {timeLeft!==null&&(
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:800,color:timeLeft<60?C.red:timeLeft<300?C.amber:C.green}}>
                {Math.floor(timeLeft/60)}:{String(timeLeft%60).padStart(2,"0")}
              </div>
              <div style={{fontSize:10,color:C.muted}}>REMAINING</div>
            </div>
          )}
        </div>
        <div style={{marginTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted,marginBottom:3}}>
            <span>{answered} answered</span><span>{pct}%</span>
          </div>
          <div style={{height:5,background:C.border,borderRadius:4}}>
            <div style={{height:"100%",width:pct+"%",background:C.accent,borderRadius:4,transition:"width .3s"}}/>
          </div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:10}}>
          {exam.questions.map((q,i)=>{
            const isManual=isManualType(q.type);
            return(
              <button key={i} onClick={()=>setCurrent(i)}
                style={{width:28,height:28,borderRadius:6,border:"1px solid "+(answers[q.id]?C.accent:isManual?C.purple+"66":C.border),
                  background:i===current?C.accent:answers[q.id]?C.accentLight:isManual?C.purpleBg:C.elevated,
                  color:i===current?"#fff":C.text,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                {i+1}
              </button>
            );
          })}
        </div>
        {hasManual&&(
          <div style={{marginTop:8,fontSize:11,color:C.purple}}>
            📝 Purple questions are open-ended — your teacher will grade those manually.
          </div>
        )}
      </div>

      {q&&<QuestionCard q={q} idx={current} answer={answers[q.id]} onChange={a=>setAnswers(prev=>({...prev,[q.id]:a}))}/>}

      <div style={{display:"flex",gap:10,marginTop:12}}>
        <button style={{...S.btn(C.elevated,C.muted),flex:1,border:"1px solid "+C.border}} disabled={current===0} onClick={()=>setCurrent(c=>c-1)}>← Prev</button>
        {current<total-1
          ?<button style={{...S.btn(),flex:2}} onClick={()=>setCurrent(c=>c+1)}>Next →</button>
          :<button style={{...S.btn(C.green),flex:2}} onClick={()=>submit()}>Submit Exam ✓</button>
        }
      </div>
      {exam.instructions&&<div style={{...S.card,marginTop:12,fontSize:12,color:C.muted,borderStyle:"dashed"}}>📋 {exam.instructions}</div>}
    </div>
  );
}

function QuestionCard({q,idx,answer,onChange}){
  const isManual=isManualType(q.type);
  return(
    <div style={{...S.card,border:"1.5px solid "+(isManual?C.purple+"44":C.border),background:isManual?C.purpleBg+"50":"#fff"}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>
        Q{idx+1}. {q.text}
        <span style={{...S.badge(C.accent,C.accentLight),marginLeft:8,fontSize:10}}>{q.marks} mark{q.marks>1?"s":""}</span>
        {q.type==="tf"&&<span style={{...S.badge(C.green,C.greenBg),marginLeft:4,fontSize:10}}>True/False</span>}
        {q.type==="essay"&&<span style={{...S.badge(C.purple,C.purpleBg),marginLeft:4,fontSize:10}}>Essay</span>}
        {q.type==="short"&&<span style={{...S.badge(C.teal,C.tealBg),marginLeft:4,fontSize:10}}>Short Answer</span>}
      </div>
      {isManual&&<div style={{fontSize:11,color:C.purple,marginBottom:10}}>📝 This answer will be reviewed and graded by your teacher.</div>}

      {q.type==="mcq"&&(
        <div style={{marginTop:8}}>
          {(q.options||[]).map((opt,i)=>(
            <label key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,
              marginBottom:6,cursor:"pointer",
              background:answer===opt?C.accentLight:C.elevated,
              border:"1.5px solid "+(answer===opt?C.accent:C.border),
              transition:"all .15s"}}>
              <input type="radio" name={"q_"+q.id} checked={answer===opt} onChange={()=>onChange(opt)} style={{width:"auto",border:"none"}}/>
              <span style={{fontSize:13,fontWeight:answer===opt?700:400}}>{String.fromCharCode(65+i)}. {opt}</span>
            </label>
          ))}
        </div>
      )}

      {q.type==="tf"&&(
        <div style={{display:"flex",gap:12,marginTop:10}}>
          {["True","False"].map(opt=>(
            <label key={opt} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,
              padding:"12px",borderRadius:10,cursor:"pointer",
              background:answer===opt?(opt==="True"?C.greenBg:C.redBg):C.elevated,
              border:"2px solid "+(answer===opt?(opt==="True"?C.green:C.red):C.border),
              transition:"all .15s"}}>
              <input type="radio" name={"q_"+q.id} checked={answer===opt} onChange={()=>onChange(opt)} style={{width:"auto",border:"none"}}/>
              <span style={{fontWeight:700,fontSize:14,color:answer===opt?(opt==="True"?C.green:C.red):C.muted}}>
                {opt==="True"?"✓ True":"✗ False"}
              </span>
            </label>
          ))}
        </div>
      )}

      {q.type==="fill"&&(
        <input value={answer||""} onChange={e=>onChange(e.target.value)} placeholder="Type your answer here…" style={{marginTop:10}}/>
      )}

      {q.type==="short"&&(
        <textarea value={answer||""} onChange={e=>onChange(e.target.value)} rows={3}
          placeholder="Write a brief answer…" style={{...S.inp,marginTop:10,resize:"vertical"}}/>
      )}

      {q.type==="essay"&&(
        <textarea value={answer||""} onChange={e=>onChange(e.target.value)} rows={6}
          placeholder="Write your detailed answer here…" style={{...S.inp,marginTop:10,resize:"vertical"}}/>
      )}

      {q.type==="match"&&(
        <div style={{marginTop:10}}>
          {(q.pairs||[]).map((p,i)=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
              <div style={{flex:1,padding:"8px 12px",background:C.elevated,borderRadius:8,border:"1px solid "+C.border,fontSize:13,fontWeight:600}}>{p.left}</div>
              <span style={{color:C.muted}}>→</span>
              <input value={(answer&&answer[p.id])||""} onChange={e=>onChange({...(answer||{}),[p.id]:e.target.value})}
                placeholder="Match here…" style={{flex:1}}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Student Results ─── */
function StudentResults({submissions,data}){
  if(submissions.length===0)return<div style={{...S.card,textAlign:"center",color:C.faint,padding:40}}>No results yet. Complete an exam to see your scores!</div>;
  const graded=submissions.filter(s=>s.status==="graded");
  const avg=graded.length>0?Math.round(graded.reduce((s,sub)=>s+(sub.pct||0),0)/graded.length):0;
  const best=graded.length>0?Math.max(...graded.map(s=>s.pct||0)):0;
  return(
    <div>
      <div style={S.g3}>
        {[{l:"Submitted",v:submissions.length,c:C.accent},{l:"Graded",v:graded.length,c:C.green},{l:"Best Score",v:graded.length>0?best+"%":"—",c:C.green}].map(s=>(
          <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
        ))}
      </div>
      {submissions.slice().reverse().map(sub=>{
        const exam=(data.exams||[]).find(e=>e.id===sub.examId);
        const isGraded=sub.status==="graded";
        const gr=isGraded?getGrade(sub.pct||0):null;
        return(
          <div key={sub.id} style={{...S.card,border:"1px solid "+(isGraded?gr.c+"33":C.purple+"44")}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>{exam?.title||"Exam"}</div>
                <div style={{fontSize:11,color:C.muted}}>{exam?.subject||""} · Submitted {sub.submittedAt?.slice(0,10)}</div>
                {isGraded&&sub.gradedAt&&<div style={{fontSize:11,color:C.green}}>Graded {sub.gradedAt?.slice(0,10)}</div>}
              </div>
              <div style={{textAlign:"right"}}>
                {isGraded?(
                  <>
                    <div style={{fontSize:22,fontWeight:900,color:gr.c}}>{sub.pct}%</div>
                    <div style={{...S.badge(gr.c,gr.c+"22")}}>{gr.g} — {gr.l}</div>
                  </>
                ):(
                  <span style={{...S.badge(C.purple,C.purpleBg)}}>⏳ Awaiting Teacher</span>
                )}
              </div>
            </div>
            {isGraded&&(
              <div style={{marginTop:10}}>
                <div style={{height:6,background:C.border,borderRadius:4}}>
                  <div style={{height:"100%",width:sub.pct+"%",background:gr.c,borderRadius:4}}/>
                </div>
                <div style={{fontSize:11,color:C.muted,marginTop:4}}>{sub.earned}/{sub.total} marks</div>
              </div>
            )}
            {/* Show AI feedback if any */}
            {isGraded&&sub.feedback&&Object.keys(sub.feedback).length>0&&(
              <div style={{marginTop:10,padding:"8px 12px",background:C.purpleBg,borderRadius:8,border:"1px solid "+C.purple+"33"}}>
                <div style={{fontSize:10,fontWeight:700,color:C.purple,marginBottom:4}}>📝 TEACHER FEEDBACK</div>
                {Object.entries(sub.feedback).map(([qid,fb])=>{
                  const q=(exam?.questions||[]).find(q=>q.id===qid);
                  return fb?(<div key={qid} style={{fontSize:12,color:C.text,marginBottom:4}}>
                    <strong>{q?.text?.slice(0,40)||"Q"}:</strong> {fb}
                  </div>):null;
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════ RESULTS VIEW (Teacher/Admin) ═══════════════════════════ */
function ResultsView({data,users,myExams,isAdmin}){
  const exams=myExams||(data.exams||[]);
  const[selExam,setSelExam]=useState("");
  const allSubs=(data.submissions||[]).filter(s=>selExam?s.examId===selExam:true);
  const gradedSubs=allSubs.filter(s=>s.status==="graded");
  const pendingSubs=allSubs.filter(s=>s.status==="pending");
  const exam=exams.find(e=>e.id===selExam);

  return(
    <div>
      <div style={S.card}>
        <div style={{fontWeight:700,marginBottom:10}}>Filter by Exam</div>
        <select value={selExam} onChange={e=>setSelExam(e.target.value)}>
          <option value="">All exams</option>
          {exams.map(e=><option key={e.id} value={e.id}>{e.title}</option>)}
        </select>
      </div>

      {pendingSubs.length>0&&(
        <div style={{...S.card,border:"1.5px solid "+C.amber+"44",background:C.amberBg}}>
          <div style={{fontWeight:700,color:C.amber}}>⏳ {pendingSubs.length} Submission{pendingSubs.length>1?"s":""} Awaiting Grading</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4}}>These have been submitted but not yet graded. Go to the Grading tab to review them.</div>
        </div>
      )}

      {gradedSubs.length===0&&<div style={{...S.card,color:C.faint,textAlign:"center",padding:32}}>No graded submissions {selExam?"for this exam":"yet"}.</div>}

      {gradedSubs.length>0&&(
        <>
          <div style={S.g3}>
            {[
              {l:"Graded",v:gradedSubs.length,c:C.accent},
              {l:"Average Score",v:Math.round(gradedSubs.reduce((s,x)=>s+(x.pct||0),0)/gradedSubs.length)+"%",c:C.blue},
              {l:"Pass Rate",v:Math.round((gradedSubs.filter(s=>s.pct>=50).length/gradedSubs.length)*100)+"%",c:C.green},
            ].map(s=>(
              <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
            ))}
          </div>
          <div style={S.card}>
            <div style={{fontWeight:700,marginBottom:10}}>{exam?exam.title+" — Results":"All Graded Results"}</div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:C.elevated}}>
                    {["Student","Class","Score","Grade","Graded"].map(h=>(
                      <th key={h} style={{padding:"8px 10px",textAlign:"left",color:C.muted,fontWeight:700,borderBottom:"1px solid "+C.border,fontSize:11,textTransform:"uppercase",letterSpacing:".5px"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {gradedSubs.slice().sort((a,b)=>(b.pct||0)-(a.pct||0)).map((s,i)=>{
                    const gr=getGrade(s.pct||0);
                    return(
                      <tr key={s.id} style={{background:i%2===0?"transparent":C.elevated}}>
                        <td style={{padding:"8px 10px",fontWeight:600}}>{s.studentName}</td>
                        <td style={{padding:"8px 10px",color:C.muted}}>{s.studentClass||"—"}</td>
                        <td style={{padding:"8px 10px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontWeight:700,color:gr.c}}>{s.pct}%</span>
                            <div style={{flex:1,height:5,background:C.border,borderRadius:4,minWidth:50}}>
                              <div style={{height:"100%",width:s.pct+"%",background:gr.c,borderRadius:4}}/>
                            </div>
                          </div>
                        </td>
                        <td style={{padding:"8px 10px"}}><span style={{...S.badge(gr.c,gr.c+"22")}}>{gr.g}</span></td>
                        <td style={{padding:"8px 10px",color:C.muted}}>{s.gradedAt?.slice(0,10)||s.submittedAt?.slice(0,10)}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}

      {isAdmin&&gradedSubs.length>0&&<DeliberationPanel subs={gradedSubs} users={users} exam={exam}/>}
    </div>
  );
}

/* ─── Deliberation ─── */
function DeliberationPanel({subs,users,exam}){
  const sorted=subs.slice().sort((a,b)=>(b.pct||0)-(a.pct||0));
  const pass=sorted.filter(s=>s.pct>=50);
  const fail=sorted.filter(s=>s.pct<50);
  return(
    <div style={S.card}>
      <div style={{fontWeight:700,marginBottom:4}}>⚖️ Deliberation</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:14}}>Pass/fail decisions · Rankings · Weak learners</div>
      <div style={S.g3}>
        {[{l:"Passed",v:pass.length,c:C.green},{l:"Failed",v:fail.length,c:C.red},{l:"Pass Rate",v:subs.length>0?Math.round((pass.length/subs.length)*100)+"%":"0%",c:C.blue}].map(s=>(
          <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
        ))}
      </div>
      {fail.length>0&&(
        <div style={{padding:"10px 14px",background:C.redBg,borderRadius:9,border:"1px solid "+C.red+"33",marginTop:8}}>
          <div style={{fontWeight:700,color:C.red,marginBottom:6,fontSize:13}}>⚠️ Students Needing Support</div>
          {fail.map(s=>(
            <div key={s.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",borderBottom:"1px solid "+C.red+"22"}}>
              <span style={{fontWeight:600}}>{s.studentName}</span>
              <span style={{color:C.red,fontWeight:700}}>{s.pct}% — FAIL</span>
            </div>
          ))}
        </div>
      )}
      <div style={{marginTop:10}}>
        <div style={{fontWeight:700,fontSize:12,marginBottom:6}}>🏆 Class Ranking</div>
        {sorted.slice(0,10).map((s,i)=>{
          const gr=getGrade(s.pct||0);
          return(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid "+C.border,fontSize:12}}>
              <span style={{width:20,fontWeight:700,color:i<3?C.amber:C.muted}}>#{i+1}</span>
              <span style={{flex:1,fontWeight:600}}>{s.studentName}</span>
              <span style={{fontWeight:700,color:gr.c}}>{s.pct}%</span>
              <span style={{...S.badge(gr.c,gr.c+"22")}}>{gr.g}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════ RESOURCES PANEL ═══════════════════════════ */
function ResourcesPanel({user,data,setData,toast,isTeacher,isStudent}){
  const[form,setForm]=useState({title:"",subject:"",type:"Notes",url:"",description:""});
  const[adding,setAdding]=useState(false);
  const resources=data.resources||[];

  async function addResource(){
    if(!form.title||!form.url){toast("Fill title and URL","err");return;}
    const res={id:uid(),...form,teacherId:user?.id,teacherUsername:user?.username,teacherName:user?.name,createdAt:now()};
    const updated=[...resources,res];
    setData(d=>({...d,resources:updated}));
    dsSet("resources",updated);
    toast("Resource added ✓");
    setForm({title:"",subject:"",type:"Notes",url:"",description:""});
    setAdding(false);
  }
  async function removeResource(id){
    const updated=resources.filter(r=>r.id!==id);
    setData(d=>({...d,resources:updated}));
    dsSet("resources",updated);
    toast("Resource removed");
  }
  return(
    <div>
      {isTeacher&&(
        <>
          {!adding&&<button style={{...S.btn(),width:"100%",marginBottom:12}} onClick={()=>setAdding(true)}>+ Upload Resource</button>}
          {adding&&(
            <div style={S.card}>
              <div style={{fontWeight:700,marginBottom:12}}>Add Learning Resource</div>
              {[["Title","title","text"],["Subject","subject","text"],["URL / Link","url","url"]].map(([l,k,t])=>(
                <div key={k} style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:4}}>{l}</div>
                  <input type={t} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} placeholder={l}/>
                </div>
              ))}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Type</div>
                <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                  {["Notes","PDF","Video","Slide","Exercise","Other"].map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:4}}>Description (optional)</div>
                <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={2} style={{...S.inp,resize:"vertical"}} placeholder="Brief description…"/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button style={{...S.btn(),flex:2}} onClick={addResource}>Save Resource</button>
                <button style={{...S.btn(C.elevated,C.muted),flex:1,border:"1px solid "+C.border}} onClick={()=>setAdding(false)}>Cancel</button>
              </div>
            </div>
          )}
        </>
      )}
      {resources.length===0&&<div style={{...S.card,color:C.faint,textAlign:"center",padding:40}}>No resources yet.</div>}
      {resources.map(r=>(
        <div key={r.id} style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{r.title}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{r.subject} · {r.teacherName||"Teacher"}</div>
              {r.description&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>{r.description}</div>}
            </div>
            <span style={{...S.badge(C.accent,C.accentLight),marginLeft:8}}>{r.type}</span>
          </div>
          <div style={{marginTop:10,display:"flex",gap:8}}>
            <a href={r.url} target="_blank" rel="noreferrer"
              style={{...S.btn(C.blueBg,C.blue),textDecoration:"none",fontSize:12,padding:"5px 14px",border:"1px solid "+C.blue+"33"}}>
              📥 Open
            </a>
            {isTeacher&&<button style={{...S.btn(C.redBg,C.red),fontSize:11,padding:"5px 10px",border:"1px solid "+C.red+"33"}} onClick={()=>removeResource(r.id)}>Remove</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ─── Announcements Panel ─── */
function AnnouncementsPanel({data,role}){
  const anns=(data.announcements||[]).filter(a=>a.target==="all"||a.target===role).slice(-5).reverse();
  if(anns.length===0)return null;
  return(
    <div style={{...S.card,border:"1.5px solid "+C.accent+"44",background:C.accentLight}}>
      <div style={{fontWeight:700,color:C.accent,marginBottom:8}}>📢 Announcements</div>
      {anns.map(a=>(
        <div key={a.id} style={{padding:"7px 0",borderBottom:"1px solid "+C.borderAccent,fontSize:13}}>
          <div style={{color:C.text}}>{a.text}</div>
          <div style={{fontSize:10,color:C.muted,marginTop:2}}>{a.author} · {a.date}</div>
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════ MAIN APP ═══════════════════════════ */
function App(){
  const[user,setUser]=useState(null);
  const[users,setUsers]=useState(INIT_USERS);
  const[data,setData]=useState(INIT_DATA);
  const[loading,setLoading]=useState(true);
  const[showToast,toastEl]=useToast();

  useEffect(()=>{
    (async()=>{
      try{
        const [u,d]=await Promise.all([getOnlineUsers(),getOnlineData()]);
        if(u&&u.length>0) setUsers(u);
        if(d){
          setData({
            students:d.students||INIT_DATA.students,
            teachers:d.teachers||INIT_DATA.teachers,
            resources:d.resources||[],
            exams:d.exams||[],
            submissions:d.submissions||[],
            announcements:d.announcements||[],
          });
          _latestData=d;
        }
      }catch(e){console.error("Load error",e);}
      setLoading(false);
    })();
  },[]);

  function doLogout(){setUser(null);}

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:42}}>🎓</div>
      <div style={{fontSize:22,fontWeight:900,color:C.accent}}>EduIQ</div>
      <Spinner/>
      <div style={{color:C.muted,fontSize:13}}>Loading school data…</div>
    </div>
  );

  if(!user) return<LoginPage onLogin={setUser} users={users} setUsers={setUsers}/>;

  return(
    <div style={{minHeight:"100vh"}}>
      {toastEl}
      <div style={{background:"#fff",borderBottom:"1px solid "+C.border,position:"sticky",top:0,zIndex:100,
        boxShadow:"0 1px 8px rgba(99,102,241,.07)"}}>
        <div style={{maxWidth:700,margin:"0 auto",padding:"0 14px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>🎓</span>
            <span style={{fontWeight:900,fontSize:17,color:C.accent,letterSpacing:-0.5}}>EduIQ</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{fontSize:11,color:C.muted,textAlign:"right"}}>
              <div style={{fontWeight:700,color:C.text}}>{user.name}</div>
              <div style={{textTransform:"capitalize"}}>{user.role}</div>
            </div>
            <button onClick={doLogout} style={{...S.btn(C.redBg,C.red),fontSize:11,padding:"5px 12px",border:"1px solid "+C.red+"44"}}>Sign Out</button>
          </div>
        </div>
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:"16px 14px 40px"}}>
        <div className="fade-in">
          {user.role==="admin"&&<AdminDash user={user} data={data} setData={setData} users={users} setUsers={setUsers} toast={showToast} onLogout={doLogout}/>}
          {user.role==="teacher"&&<TeacherDash user={user} data={data} setData={setData} users={users} toast={showToast}/>}
          {user.role==="student"&&<StudentDash user={user} data={data} setData={setData} toast={showToast}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
