/* ─── Rwanda Market Prices ─── */
const RW_BASE_PRICES={
  Piglet:  {base:10000,unit:"head",desc:"Under 10kg",trend:"stable"},
  Weaner:  {base:32000,unit:"head",desc:"10–25kg",trend:"up"},

function getDailyVariance(){
  const d=new Date();
  const seed=(d.getDate()*17+d.getMonth()*31)%100;
  return 1+((seed-50)/800);
}
function getMarketPrice(stage,weight){
  const v=getDailyVariance();
  if(weight>=80) return Math.round(weight*(RW_BASE_PRICES.heavy.base*v));
  const p=RW_BASE_PRICES[stage];
  return p?Math.round(p.base*v):Math.round(weight*1800*v);
}
function addDays(dateStr,n){
  if(!dateStr)return "";
  const d=new Date(dateStr);
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function daysDiff(dateStr){
  if(!dateStr)return 999;
  return Math.round((new Date(dateStr)-new Date())/(1000*60*60*24));
}
const GESTATION=114;
const HEAT_CYCLE=21;

/* ─── LocalStorage (non-user data) ─── */
function getLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function setLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

/* ─── Firebase Firestore User Storage ─── */
async function getOnlineUsers(){
  try{
    const doc=await db.collection("farmiq").doc("users").get();
    if(doc.exists&&doc.data().list) return doc.data().list;
    return null;
  }catch(e){console.error("Firebase getUsers error",e);return null;}
}
async function setOnlineUsers(users){
  try{
    const p=db.collection("farmiq").doc("users").set({list:users,updatedAt:new Date().toISOString()});
    const timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),8000));
    await Promise.race([p,timeout]);
  }catch(e){console.error("Firebase setUsers error",e);throw e;}
}
async function getOnlineSession(){
  try{
    const v=localStorage.getItem("fiq_session");
    return v?JSON.parse(v):null;
  }catch{return null;}
}
async function setOnlineSession(user){
  try{
    if(user) localStorage.setItem("fiq_session",JSON.stringify(user));
    else localStorage.removeItem("fiq_session");
  }catch(e){console.error("Session error",e);}
}

/* ─── Firestore Generic Sync Helpers ─── */
async function fsSet(key,list){
  try{await db.collection("farmiq").doc(key).set({list,updatedAt:new Date().toISOString()});}
  catch(e){console.error("fsSet error",key,e);}
}
function fsListen(key,setter,setLoaded,fallback){
  return db.collection("farmiq").doc(key).onSnapshot(doc=>{
    if(doc.exists&&doc.data().list) setter(doc.data().list);
    else if(fallback!==undefined) setter(fallback);
    if(setLoaded) setLoaded(true);
  },err=>{
    console.error("fsListen error",key,err);
    if(setLoaded) setLoaded(true);
  });
}

/* ─── API Key Store ─── */
function getApiKey(){return localStorage.getItem("fiq_apikey")||"";}
function setApiKey(k){localStorage.setItem("fiq_apikey",k);}

/* ─── AI helper — fully online via Claude API ─── */
async function askAI(prompt,farmData){
  const key=getApiKey();
  if(!key) return{text:"__NO_KEY__",source:"no_key"};
  try{
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),30000);
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",signal:ctrl.signal,
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})
    });
    clearTimeout(t);
    if(r.status===401) return{text:"__AUTH_ERROR__",source:"auth_error"};
    if(!r.ok){const err=await r.json().catch(()=>({}));return{text:`__API_ERROR__:${err?.error?.message||r.status}`,source:"api_error"};}
    const d=await r.json();
    const txt=d.content?.[0]?.text;
    if(txt) return{text:txt,source:"ai"};
    return{text:"__EMPTY__",source:"empty"};
  }catch(e){
    if(e.name==="AbortError") return{text:"__TIMEOUT__",source:"timeout"};
    return{text:`__NETWORK__:${e.message}`,source:"network"};
  }
}

4;font-weight:800;font-size:13px;}.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}.badge-green{background:#dcfce7;color:#16a34a;}.badge-red{background:#fee2e2;color:#dc2626;}.badge-amber{background:#fef3c7;color:#d97706;}.badge-blue{background:#dbeafe;color:#2563eb;}.summary-box{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:20px;margin:20px 0;}.summary-box.red{background:#fef2f2;border-color:#fca5a5;}.footer{position:fixed;bottom:0;left:0;right:0;background:#f8fafc;border-top:1px solid #e2e8f0;padding:8px 40px;display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;}.page-break{page-break-before:always;}@media print{.footer{position:fixed;bottom:0;}}`;
  let title="FULL FARM REPORT";
  if(type==="finance")title="FINANCIAL & LEDGER REPORT";
  if(type==="health")title="HEALTH & OPERATIONS REPORT";
  if(type==="messages")title="WORKER MESSAGES REPORT";
  if(type==="pnl")title="PROFIT & LOSS ANALYSIS";
  const allIncomeRows=[...sales.map(s=>{const pig=pigs.find(p=>p.id===s.pigId);return{date:s.date,cat:"Pig Sale",desc:`${pig?pig.tag:"Pig"} sold to ${s.buyer||"—"} (${s.weight||0}kg @ RWF${fmtNum(s.priceKg)}/kg)`,amount:s.total,worker:s.worker};}), ...incomes.map(i=>({date:i.date,cat:i.category,desc:i.description||i.category,amount:i.amount,worker:i.worker||"Admin"}))].sort((a,b)=>b.date?.localeCompare(a.date));
  const allExpenseRows=[...feeds.map(f=>({date:f.date,cat:"Feed Purchase",desc:`${f.feedType} (${f.kg}kg) — ${f.worker}`,amount:f.cost,worker:f.worker})), ...expenses.map(e=>({date:e.date,cat:e.category,desc:e.description||e.category,amount:e.amount,worker:e.worker||"Admin"}))].sort((a,b)=>b.date?.localeCompare(a.date));

  let body="";

    body+=`<div class="section-title">Income by Category</div><table><thead><tr><th>Category</th><th>Amount</th><th>% of Total</th></tr></thead><tbody>`;
    Object.entries(incByCat).sort((a,b)=>b[1]-a[1]).forEach(([cat,amt])=>{body+=`<tr class="income-row"><td>${cat}</td><td>${fmtRWF(amt)}</td><td>${totalIncome>0?((amt/totalIncome)*100).toFixed(1):0}%</td></tr>`;});

    active.forEach(pig=>{const val=getMarketPrice(pig.stage,pig.weight);body+=`<tr><td><strong>${pig.tag}</strong></td><td>${pig.stage}</td><td>${pig.weight}kg</td><td>${pig.breed}</td><td style="color:#16c784;font-weight:700">${fmtRWF(val)}</td><td><span class="badge badge-green">Active</span></td></tr>`;});
    body+=`<tr style="background:#f0fdf4"><td colspan="4"><strong>TOTAL HERD VALUE</strong></td><td style="color:#16c784;font-weight:800">${fmtRWF(herdValue)}</td><td></td></tr></tbody></table>`;

    if(reproductions.length>0){
      body+=`<div class="section-title">Reproduction Records</div><table><thead><tr><th>Sow</th><th>Boar</th><th>Mating Date</th><th>Expected Farrowing</th><th>Status</th><th>Piglets</th></tr></thead><tbody>`;
      reproductions.forEach(r=>{const sow=pigs.find(p=>p.id===r.sowId);const boar=pigs.find(p=>p.id===r.boarId);body+=`<tr><td>${sow?sow.tag:"—"}</td><td>${boar?boar.tag:"—"}</td><td>${r.matingDate||"—"}</td><td>${r.expectedFarrow||"—"}</td><td><span class="badge ${r.status==="farrowed"?"badge-green":r.status==="pregnant"?"badge-amber":"badge-red"}">${r.status}</span></td><td>${r.piglets||"—"}</td></tr>`;});
      body+=`</tbody></table>`;
    }
  }
  if(type==="messages"){
    const workers=users.filter(u=>u.role==="worker"&&u.approved);
    body+=`<div class="section-title">Worker Overview</div><table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Status</th></tr></thead><tbody>`;
    workers.forEach(w=>{body+=`<tr><td>${w.name}</td><td>@${w.username}</td><td>Worker</td><td><span class="badge badge-green">Active</span></td></tr>`;});
    body+=`</tbody></table><div class="section-title">Broadcast Messages (${messages.length})</div>`;
    messages.slice().reverse().forEach(m=>{body+=`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:10px"><div style="font-size:11px;color:#64748b;margin-bottom:6px"><strong>${m.from}</strong> · ${m.date} ${m.time} · Sent to ${m.recipients} worker(s)</div><div style="font-size:12px;color:#1e293b;line-height:1.6">${m.text}</div></div>`;});
    if(!messages.length)body+=`<p style="color:#94a3b8;font-size:13px">No messages sent yet.</p>`;
  }
  return`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>FarmIQ Report</title><style>${css}</style></head><body><div class="header"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="logo">🐷 Farm<span>IQ</span></div><div class="subtitle">AI Pig Farm Management System — Rwanda</div></div><div style="text-align:right"><div class="report-type">${title}</div><div class="meta">Generated: ${now}</div></div></div></div><div class="body">${body}</div><div class="footer"><span>FarmIQ — Confidential Farm Report — ${now}</span><span>Powered by FarmIQ AI</span></div></body></html>`;
}

function downloadPDF(type,data,label){
  const html=buildPDFHTML(type,data);
  const blob=new Blob([html],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const win=window.open(url,"_blank");
  if(win){win.onload=()=>{setTimeout(()=>{win.focus();win.print();},800);};}
  else{const a=document.createElement("a");a.href=url;a.download=`FarmIQ_${type}_${toDay()}.html`;a.click();}
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

function AIPrediction({pigs,feeds,sales,logs,expenses,incomes,reproductions,stock,topic,label,icon,autoRun}){
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [done,setDone]=useState(false);
  const [showKeyModal,setShowKeyModal]=useState(false);

  async function predict(){
    if(loading||done)return;
    setLoading(true);setResult(null);
    const active=pigs.filter(p=>p.status==="active");
    const totalInc=sales.reduce((s,l)=>s+(l.total||0),0)+incomes.reduce((s,l)=>s+(l.amount||0),0);
    const totalExp=feeds.reduce((s,l)=>s+(l.cost||0),0)+expenses.reduce((s,l)=>s+(l.amount||0),0);
    const sick=logs.reduce((s,l)=>s+(l.sick||0),0);
    const deaths=logs.reduce((s,l)=>s+(l.deaths||0),0);
    const stages=active.reduce((a,p)=>{a[p.stage]=(a[p.stage]||0)+1;return a;},{});
    const pregnant=(reproductions||[]).filter(r=>r.status==="pregnant").length;
    const herdVal=active.reduce((s,pig)=>s+getMarketPrice(pig.stage,pig.weight),0);
    const lowStock=(stock||[]).filter(s=>s.quantity<=s.minLevel).map(s=>s.name).join(", ")||"none";
    const ctx=`Expert pig farm advisor Rwanda. active=${active.length} stages=${JSON.stringify(stages)} income=${Math.round(totalInc)} expenses=${Math.round(totalExp)} profit=${Math.round(totalInc-totalExp)} sick=${sick} deaths=${deaths} pregnant_sows=${pregnant} herd_market_value=${Math.round(herdVal)} low_stock=${lowStock} sales=${sales.length} logs=${logs.length}. Topic: ${topic}. Give 5-7 Rwanda-specific bullet points. Use RWF. Today is ${toDay()}.`;
    const res=await askAI(ctx,{});
    setResult(res);setLoading(false);
    if(res.source!=="no_key"&&res.source!=="auth_error"&&res.source!=="timeout"&&res.source!=="network"&&res.source!=="api_error")setDone(true);
  }

  useEffect(()=>{if(autoRun&&getApiKey())predict();},[]);

  const isError=result&&["no_key","auth_error","timeout","network","api_error","empty"].includes(result.source);
  return(<div style={S.aiCard} className="ai-glow fade-in">
    {showKeyModal&&<ApiKeyModal onClose={()=>{setShowKeyModal(false);}}/>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:17}}>{icon}</span>
        <span style={{fontWeight:600,fontSize:14,color:C.text}}>{label}</span>
      </div>
      <AIStatusPill onSetKey={()=>setShowKeyModal(true)}/>
    </div>
    {!done&&!loading&&!isError&&<button style={{...S.btn("#166534"),fontSize:12,padding:"6px 13px"}} onClick={predict}>Generate Insight →</button>}
    {loading&&<div style={{display:"flex",alignItems:"center",gap:10,color:C.accent,fontSize:13}}><span className="spin" style={S.loader}></span>Asking Claude AI online…</div>}
    {isError&&<><AIErrorMsg source={result.source} text={result.text} onSetKey={()=>setShowKeyModal(true)}/><button style={{...S.btn("#166534"),fontSize:11,padding:"5px 11px",marginTop:8}} onClick={()=>{setResult(null);setDone(false);predict();}}>Retry →</button></>}
    {done&&result&&result.source==="ai"&&<div style={{fontSize:13,color:C.text,lineHeight:1.8,whiteSpace:"pre-wrap"}}>{result.text}</div>}
  </div>);
}

  const boars=pigs.filter(p=>p.status==="active"&&p.stage==="Boar");

  function logMating(){
    if(!form.sowId||!form.matingDate)return;
    const expectedFarrow=addDays(form.matingDate,GESTATION);
    setReproductions(r=>[...r,{id:uid(),sowId:form.sowId,boarId:form.boarId,matingDate:form.matingDate,expectedFarrow,status:"pregnant",piglets:0,notes:form.notes,loggedDate:toDay()}]);
    setSaved(true);
    setTimeout(()=>{setSaved(false);setForm({sowId:"",boarId:"",matingDate:toDay(),notes:""});},2000);
  }

  function updateStatus(id,status,piglets){
    setReproductions(r=>r.map(x=>x.id===id?{...x,status,piglets:piglets||x.piglets,farrowDate:status==="farrowed"?toDay():x.farrowDate}:x));
  }

  const pregnant=reproductions.filter(r=>r.status==="pregnant");
  const farrowed=reproductions.filter(r=>r.status==="farrowed");

  const overdue=pregnant.filter(r=>daysDiff(r.expectedFarrow)<0);
  const totalPiglets=farrowed.reduce((s,r)=>s+(r.piglets||0),0);
  const tabs=["overview","log","schedule","ai"];

  return(<div>
    <div style={S.h1}>🐖 Reproduction Management</div>
    <div style={S.sub}>Track breeding, predict farrowings, AI-powered reproduction insights</div>

    {/* Alerts */}
    {upcomingFarrows.length>0&&<div style={{padding:"11px 14px",background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.3)",borderRadius:9,marginBottom:12,fontSize:13,color:C.amber}}>

      {upcomingFarrows.map(r=>{const sow=pigs.find(p=>p.id===r.sowId);return<div key={r.id} style={{marginTop:4,paddingLeft:16}}>• {sow?sow.tag:"Sow"} — expected {r.expectedFarrow} ({daysDiff(r.expectedFarrow)} days)</div>;})}
    </div>}
    {overdue.length>0&&<div style={{padding:"11px 14px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",borderRadius:9,marginBottom:12,fontSize:13,color:C.red}}>
      ⚠️ <strong>{overdue.length}</strong> overdue farrowing(s) — check these sows immediately!
      {overdue.map(r=>{const sow=pigs.find(p=>p.id===r.sowId);return<div key={r.id} style={{marginTop:4,paddingLeft:16}}>• {sow?sow.tag:"Sow"} — was due {r.expectedFarrow} ({Math.abs(daysDiff(r.expectedFarrow))} days ago)</div>;})}
    </div>}

    {/* Stats */}
    <div style={S.g4}>
      {[{l:"Breeding Females",v:sows.length,c:C.pink},{l:"Active Boars",v:boars.length,c:C.accent},{l:"Pregnant",v:pregnant.length,c:C.amber},{l:"Piglets Born",v:fmtNum(totalPiglets),c:C.purple}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
      ))}
    </div>

    {/* Tabs */}
    <div style={{display:"flex",background:C.elevated,borderRadius:9,padding:3,marginBottom:16,gap:2,border:"1px solid "+C.border}}>
      {[["overview","🐷 Overview"],["log","➕ Log Mating"],["schedule","📅 Schedule"],["ai","🤖 AI Predict"]].map(([t,l])=>(
        <button key={t} style={S.tab(tab===t)} onClick={()=>setTab(t)}>{l}</button>

    {tab==="overview"&&(

          const sow=pigs.find(p=>p.id===r.sowId);
          const boar=pigs.find(p=>p.id===r.boarId);
          const daysLeft=daysDiff(r.expectedFarrow);

/* ─── RWANDA MARKET ─── */
function RwandaMarket({pigs,feeds,sales,logs,expenses,incomes,reproductions,stock}){
  const [lastRefresh,setLastRefresh]=useState(()=>getLS("fiq_mkt_ts",null));
  const [prices,setPrices]=useState(()=>{
    const stored=getLS("fiq_mkt_p",null);
    return stored||Object.fromEntries(Object.entries(RW_BASE_PRICES).map(([k,v])=>[k,{...v,current:Math.round(v.base*getDailyVariance())}]));
  });
  const [loading,setLoading]=useState(false);
  const active=pigs.filter(p=>p.status==="active");

  function refresh(){
    setLoading(true);
    setTimeout(()=>{
      const newPrices=Object.fromEntries(Object.entries(RW_BASE_PRICES).map(([k,v])=>[k,{...v,current:Math.round(v.base*getDailyVariance())}]));
      setPrices(newPrices);
      const now=new Date().toLocaleTimeString("en-RW",{hour:"2-digit",minute:"2-digit"});
      setLastRefresh(now);
      setLS("fiq_mkt_p",newPrices);
      setLS("fiq_mkt_ts",now);
      setLoading(false);
    },1200);
  }

  useEffect(()=>{
    const stored=getLS("fiq_mkt_ts",null);
    if(!stored)refresh();
  },[]);

  // Calculate each pig's market value
  const pigValuations=active.map(pig=>{
    const val=getMarketPrice(pig.stage,pig.weight);
    return{...pig,marketValue:val};
  });
  const totalHerdValue=pigValuations.reduce((s,p)=>s+p.marketValue,0);
  const soldValue=sales.reduce((s,l)=>s+(l.total||0),0);
  const totalInc=soldValue+incomes.reduce((s,l)=>s+(l.amount||0),0);
  const totalExp=feeds.reduce((s,l)=>s+(l.cost||0),0)+expenses.reduce((s,l)=>s+(l.amount||0),0);

  const stageColors={Piglet:"#a78bfa",Weaner:"#60a5fa",Grower:"#10b981",Finisher:C.amber,Gilt:C.pink,Sow:C.red,Boar:"#fb923c"};

        <button style={{...S.btn(C.blue),padding:"7px 13px",fontSize:12}} onClick={refresh} disabled={loading}>
          {loading?<><span className="spin" style={{...S.loader,borderTopColor:"#fff"}}/>…</>:"🔄 Refresh Prices"}

      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:12}}>📊 Current Rwanda Market Prices</div>

        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr>{["Stage/Category","Description","Market Price","Trend","Top Markets"].map(h=><th key={h} style={{textAlign:"left",color:C.faint,paddingBottom:8,borderBottom:"1px solid "+C.border,fontSize:10,paddingRight:12}}>{h}</th>)}</tr></thead>
          <tbody>
            {Object.entries(prices).map(([k,v])=>(
              <tr key={k} style={{borderBottom:"1px solid "+C.elevated}}>

      {[{l:"Active Pigs",v:active.length,c:C.accent},{l:"Total Herd Value",v:fmtRWF(totalHerdValue),c:C.accent},{l:"Market-Ready (80kg+)",v:active.filter(p=>p.weight>=80).length,c:C.amber},{l:"Avg Value/Pig",v:active.length>0?fmtRWF(totalHerdValue/active.length):"—",c:C.purple}].map(s=>(

                <td style={{padding:"8px 12px 8px 0",color:C.muted}}>{pig.weight}kg</td>
                <td style={{padding:"8px 12px 8px 0",color:C.accent,fontWeight:700}}>{fmtRWF(pig.marketValue)}</td>
                <td style={{padding:"8px 0"}}>

            <tr style={{background:C.elevated}}>
              <td colSpan={4} style={{padding:"9px 12px 9px 0",fontWeight:700,color:C.text}}>TOTAL HERD VALUE</td>
              <td style={{padding:"9px 12px 9px 0",color:C.accent,fontWeight:800,fontSize:14}}>{fmtRWF(totalHerdValue)}</td>
              <td/>

          </tbody>

      </div>
    </div>}

    {/* AI Market Analysis */}
    <div style={{fontSize:14,fontWeight:700,color:C.accent,margin:"6px 0 12px"}}>✦ AI Market Analysis</div>
    <AIPrediction pigs={pigs} feeds={feeds} sales={sales} logs={logs} expenses={expenses} incomes={incomes} reproductions={reproductions} stock={stock} topic={`Analyze Rwanda pig market conditions. Current herd value=${fmtRWF(totalHerdValue)}, ${active.filter(p=>p.weight>=80).length} ready to sell. Give best selling strategy, price negotiation tips, which markets to target, seasonal trends, and 30-day price forecast. All in RWF.`} label="Rwanda Market Intelligence" icon="📈"/>
  </div>);

/* ─── STOCK MANAGEMENT ─── */
function StockManager({stock,setStock,feeds,pigs}){
  const [tab,setTab]=useState("inventory");
  const [form,setForm]=useState({name:"",category:"Feed",quantity:"",unit:"kg",minLevel:"",costPerUnit:"",notes:""});
  const [saved,setSaved]=useState(false);
  const [adjId,setAdjId]=useState(null);
  const [adjQty,setAdjQty]=useState("");
  const CATEGORIES=["Feed","Medicine","Vaccine","Equipment","Other"];

  const active=pigs.filter(p=>p.status==="active");
  const dailyFeedKg=active.length*3;// avg 3kg per pig per day
  const monthFeedKg=dailyFeedKg*30;
  const totalFeedStock=stock.filter(s=>s.category==="Feed").reduce((t,s)=>t+(s.unit==="kg"?s.quantity:0),0);
  const daysOfFeedLeft=dailyFeedKg>0?Math.floor(totalFeedStock/dailyFeedKg):999;
  const lowItems=stock.filter(s=>s.quantity<=s.minLevel);
  const criticalItems=stock.filter(s=>s.quantity<s.minLevel*0.5);
  const totalStockValue=stock.reduce((t,s)=>t+(s.quantity*(s.costPerUnit||0)),0);

  function addItem(){
    if(!form.name||!form.quantity)return;
    setStock(p=>[...p,{...form,id:uid(),quantity:parseFloat(form.quantity)||0,minLevel:parseFloat(form.minLevel)||0,costPerUnit:parseFloat(form.costPerUnit)||0,lastUpdated:toDay()}]);
    setSaved(true);setTimeout(()=>{setSaved(false);setForm({name:"",category:"Feed",quantity:"",unit:"kg",minLevel:"",costPerUnit:"",notes:""});},2000);
  }

  function adjust(id,delta){
    setStock(p=>p.map(s=>s.id===id?{...s,quantity:Math.max(0,s.quantity+delta),lastUpdated:toDay()}:s));
  }

  function applyAdj(id){
    const delta=parseFloat(adjQty)||0;
    if(delta!==0)adjust(id,delta);
    setAdjId(null);setAdjQty("");
  }

  const statusColor=(s)=>s.quantity<s.minLevel*0.5?"rgba(239,68,68,.12)":s.quantity<=s.minLevel?"rgba(245,158,11,.08)":"transparent";
  const statusBorder=(s)=>s.quantity<s.minLevel*0.5?C.red:s.quantity<=s.minLevel?C.amber:C.border;

  return(<div>
    <div style={S.h1}>📦 Stock Management</div>
    <div style={S.sub}>Track feed, medicine, vaccines & supplies · Auto-alerts for low stock</div>

    {/* Alerts */}
    {criticalItems.length>0&&<div style={{padding:"11px 14px",background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",borderRadius:9,marginBottom:12,fontSize:13,color:C.red}}>
      🚨 <strong>Critical low stock!</strong> {criticalItems.map(s=>s.name).join(", ")} — Restock immediately
    </div>}
    {lowItems.length>0&&lowItems.length!==criticalItems.length&&<div style={{padding:"11px 14px",background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.3)",borderRadius:9,marginBottom:12,fontSize:13,color:C.amber}}>
      ⚠️ <strong>Low stock:</strong> {lowItems.filter(s=>s.quantity>s.minLevel*0.5).map(s=>s.name).join(", ")}
    </div>}

    {/* Stats */}
    <div style={S.g4}>
      {[{l:"Total Items",v:stock.length,c:C.accent},{l:"Low Stock Alerts",v:lowItems.length,c:lowItems.length>0?C.red:C.accent},{l:"Feed Stock",v:totalFeedStock+"kg",c:C.amber},{l:"Days of Feed Left",v:daysOfFeedLeft<30?daysOfFeedLeft+"d":daysOfFeedLeft+"d+",c:daysOfFeedLeft<7?C.red:daysOfFeedLeft<14?C.amber:C.accent}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
      ))}
    </div>

    {/* Feed consumption info */}
    {active.length>0&&<div style={{...S.card,padding:14,marginBottom:14,background:"rgba(22,163,74,.04)"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:8,fontWeight:700,color:C.accent}}>
        <span>🌾 Feed Consumption Monitor</span>
        <span style={{color:daysOfFeedLeft<7?C.red:daysOfFeedLeft<14?C.amber:C.accent}}>{daysOfFeedLeft} days of feed remaining</span>
      </div>
      <div style={{height:8,background:C.elevated,borderRadius:8,overflow:"hidden",marginBottom:6}}>
        <div style={{height:"100%",width:Math.min(100,daysOfFeedLeft/30*100)+"%",background:daysOfFeedLeft<7?C.red:daysOfFeedLeft<14?C.amber:C.accent,borderRadius:8,transition:"width .4s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:C.faint}}>
        <span>{active.length} pigs × ~3kg/day = {dailyFeedKg}kg/day</span>
        <span>Monthly need: ~{fmtNum(monthFeedKg)}kg</span>
      </div>
    </div>}

    {/* Tabs */}
    <div style={{display:"flex",background:C.elevated,borderRadius:9,padding:3,marginBottom:16,gap:2,border:"1px solid "+C.border}}>
      {[["inventory","📦 Inventory"],["add","➕ Add Item"],["alerts","⚠️ Alerts ("+lowItems.length+")"]].map(([t,l])=>(
        <button key={t} style={S.tab(tab===t)} onClick={()=>setTab(t)}>{l}</button>
      ))}
    </div>

    {tab==="inventory"&&(
      <div>
        {stock.length===0&&<div style={{...S.card,color:C.faint,fontSize:13}}>No stock items yet. Add your first item.</div>}
        {CATEGORIES.map(cat=>{
          const catItems=stock.filter(s=>s.category===cat);
          if(catItems.length===0)return null;
          return(<div key={cat}>
            <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:.8}}>{cat}</div>
            {catItems.map((s,i)=>(
              <div key={i} style={{...S.card,marginBottom:8,border:"1px solid "+statusBorder(s),background:s.quantity<=s.minLevel?statusColor(s):C.surface}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div>
                    <div style={{fontWeight:700,color:C.text}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.faint,marginTop:1}}>Min level: {s.minLevel}{s.unit} · Updated: {s.lastUpdated}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:18,fontWeight:800,color:s.quantity<=s.minLevel*0.5?C.red:s.quantity<=s.minLevel?C.amber:C.accent}}>{fmtNum(s.quantity)}<span style={{fontSize:12,fontWeight:400}}>{s.unit}</span></div>
                    {s.costPerUnit>0&&<div style={{fontSize:10,color:C.faint}}>{fmtRWF(s.quantity*s.costPerUnit)}</div>}
                  </div>
                </div>
                {/* Progress bar */}
                <div style={{height:5,background:C.elevated,borderRadius:5,overflow:"hidden",marginBottom:8}}>
                  <div style={{height:"100%",width:s.minLevel>0?Math.min(100,(s.quantity/s.minLevel)*50)+"%":"50%",background:s.quantity<=s.minLevel*0.5?C.red:s.quantity<=s.minLevel?C.amber:C.accent,borderRadius:5}}/>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <button onClick={()=>adjust(s.id,-1)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid "+C.border,background:C.elevated,color:C.text,fontSize:12,cursor:"pointer"}}>−</button>
                  {adjId===s.id?(
                    <div style={{display:"flex",gap:4,flex:1}}>
                      <input type="number" value={adjQty} onChange={e=>setAdjQty(e.target.value)} placeholder="+/- amount" style={{...S.inp,flex:1,padding:"4px 8px",fontSize:12}} autoFocus/>
                      <button onClick={()=>applyAdj(s.id)} style={{...S.btn(C.accent),padding:"4px 10px",fontSize:11,marginRight:0}}>✓</button>
                      <button onClick={()=>{setAdjId(null);setAdjQty("");}} style={{...S.btn("#374151"),padding:"4px 8px",fontSize:11}}>✗</button>
                    </div>
                  ):(
                    <button onClick={()=>setAdjId(s.id)} style={{padding:"4px 12px",borderRadius:6,border:"1px solid "+C.border,background:C.elevated,color:C.muted,fontSize:12,cursor:"pointer",flex:1}}>Adjust Qty</button>
                  )}
                  <button onClick={()=>adjust(s.id,1)} style={{padding:"4px 10px",borderRadius:6,border:"1px solid "+C.border,background:C.elevated,color:C.text,fontSize:12,cursor:"pointer"}}>+</button>
                  <button onClick={()=>setStock(p=>p.filter(x=>x.id!==s.id))} style={{padding:"4px 8px",borderRadius:6,border:"none",background:"transparent",color:C.red,fontSize:11,cursor:"pointer"}}>🗑</button>
                </div>
              </div>
            ))}
          </div>);
        })}
        {stock.length>0&&<div style={{...S.card,padding:12,background:"rgba(22,163,74,.04)",border:"1px solid rgba(22,163,74,.15)"}}>
          <div style={{fontSize:12,color:C.muted}}>Total inventory value: <strong style={{color:C.accent}}>{fmtRWF(totalStockValue)}</strong></div>
        </div>}
      </div>
    )}

    {tab==="add"&&(
      <div style={{maxWidth:500}}>
        {saved&&<div style={{padding:10,background:C.accentSoft,borderRadius:8,marginBottom:12,color:C.accent,fontSize:13}}>✓ Stock item added!</div>}
        <div style={S.card}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
            <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Item Name *</label><input placeholder="e.g. Maize Bran" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={S.inp}/></div>
            <div><label style={S.lbl}>Category</label><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={S.inp}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select></div>
            <div><label style={S.lbl}>Unit</label><select value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})} style={S.inp}>{["kg","litres","doses","pcs","bags","boxes"].map(u=><option key={u}>{u}</option>)}</select></div>
            <div><label style={S.lbl}>Current Quantity *</label><input type="number" placeholder="100" value={form.quantity} onChange={e=>setForm({...form,quantity:e.target.value})} style={S.inp}/></div>
            <div><label style={S.lbl}>Minimum Level Alert</label><input type="number" placeholder="20" value={form.minLevel} onChange={e=>setForm({...form,minLevel:e.target.value})} style={S.inp}/></div>
            <div style={{gridColumn:"1/-1"}}><label style={S.lbl}>Cost Per Unit (RWF)</label><input type="number" placeholder="350" value={form.costPerUnit} onChange={e=>setForm({...form,costPerUnit:e.target.value})} style={S.inp}/></div>
          </div>
          <button style={{...S.btn(),width:"100%",padding:12,fontSize:14}} onClick={addItem}>📦 Add to Stock →</button>
        </div>
      </div>
    )}

    {tab==="alerts"&&(
      <div>
        {lowItems.length===0&&<div style={{...S.card,color:C.faint,fontSize:13,textAlign:"center",padding:40}}>✅ All stock levels are healthy!</div>}
        {criticalItems.length>0&&<>
          <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:8,textTransform:"uppercase"}}>🚨 Critical — Restock Immediately</div>
          {criticalItems.map(s=>(
            <div key={s.id} style={{...S.card,border:"1px solid "+C.red,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontWeight:700,color:C.red}}>{s.name}</div><div style={{fontSize:11,color:C.faint}}>{s.category} · Min: {s.minLevel}{s.unit}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:C.red}}>{s.quantity}{s.unit}</div><div style={{fontSize:10,color:C.faint}}>Need {s.minLevel-s.quantity}+ more</div></div>
              </div>
            </div>
          ))}
        </>}
        {lowItems.filter(s=>s.quantity>s.minLevel*0.5).length>0&&<>
          <div style={{fontSize:12,fontWeight:700,color:C.amber,marginBottom:8,marginTop:12,textTransform:"uppercase"}}>⚠️ Low Stock — Order Soon</div>
          {lowItems.filter(s=>s.quantity>s.minLevel*0.5).map(s=>(
            <div key={s.id} style={{...S.card,border:"1px solid "+C.amber,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontWeight:700,color:C.amber}}>{s.name}</div><div style={{fontSize:11,color:C.faint}}>{s.category} · Min: {s.minLevel}{s.unit}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:C.amber}}>{s.quantity}{s.unit}</div><div style={{fontSize:10,color:C.faint}}>Min level: {s.minLevel}</div></div>
              </div>
            </div>
          ))}
        </>}
      </div>
    )}
  </div>);
}

/* ─── PROFIT & LOSS ANALYSIS ─── */
function ProfitLossAnalysis({pigs,feeds,sales,logs,expenses,incomes,reproductions,stock,allData}){
  const [tab,setTab]=useState("overview");
  const active=pigs.filter(p=>p.status==="active");
  const sold=pigs.filter(p=>p.status==="sold");

  // Financial totals
  const totalSaleInc=sales.reduce((s,l)=>s+(l.total||0),0);
  const totalOtherInc=incomes.reduce((s,l)=>s+(l.amount||0),0);
  const totalIncome=totalSaleInc+totalOtherInc;
  const totalFeedCost=feeds.reduce((s,l)=>s+(l.cost||0),0);
  const totalOtherExp=expenses.reduce((s,l)=>s+(l.amount||0),0);
  const totalExpense=totalFeedCost+totalOtherExp;
  const realizedProfit=totalIncome-totalExpense;

  // Unsold herd estimated value
  const herdValue=active.reduce((s,pig)=>s+getMarketPrice(pig.stage,pig.weight),0);
  // Allocate costs to unsold pigs (proportional by count)
  const totalPigs=pigs.length||1;
  const costPerPig=totalExpense/totalPigs;
  const allocatedCostUnsold=active.length*costPerPig;
  const unrealizedPnL=herdValue-allocatedCostUnsold;

  // Total portfolio
  const totalPortfolioValue=totalIncome+herdValue;
  const totalPortfolioPnL=totalPortfolioValue-totalExpense;

  // 30-day forecast
  const avgMonthlyInc=totalIncome/(Math.max(1,new Set(sales.map(s=>s.date?.slice(0,7))).size)||1);
  const avgMonthlyExp=totalExpense/(Math.max(1,new Set(feeds.map(f=>f.date?.slice(0,7))).size)||1);
  const ready80=active.filter(p=>p.weight>=80);
  const almostReady=active.filter(p=>p.weight>=65&&p.weight<80);
  const potentialRevenue30=ready80.reduce((s,p)=>s+getMarketPrice(p.stage,p.weight),0);
  const expectedExp30=avgMonthlyExp||totalExpense/Math.max(1,feeds.length)*30;
  const forecast30Profit=potentialRevenue30-expectedExp30;
  const pregnant=(reproductions||[]).filter(r=>r.status==="pregnant");
  const farrowingsNext30=pregnant.filter(r=>daysDiff(r.expectedFarrow)>=0&&daysDiff(r.expectedFarrow)<=30);
  const expectedPigletValue=farrowingsNext30.length*10*10000;// 10 piglets avg × RWF 10,000

  const tabs=["overview","sold","unsold","30day"];

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
      <div>
        <div style={S.h1}>💹 Profit & Loss Analysis</div>
        <div style={S.sub}>Full P&L for sold pigs, active herd, 30-day forecast</div>
      </div>
      <PDFBtn label="P&L Report" type="pnl" getData={()=>allData} icon="💹" color="#374151"/>
    </div>

    {/* Tabs */}
    <div style={{display:"flex",background:C.elevated,borderRadius:9,padding:3,marginBottom:16,gap:2,border:"1px solid "+C.border}}>
      {[["overview","📊 Overview"],["sold","💚 Sold Pigs"],["unsold","🐷 Unsold (Active)"],["30day","📅 30-Day Forecast"]].map(([t,l])=>(
        <button key={t} style={S.tab(tab===t)} onClick={()=>setTab(t)}>{l}</button>
      ))}
    </div>

    {tab==="overview"&&(<div>
      <div style={S.g4}>
        {[{l:"Realized Income",v:fmtRWF(totalIncome),c:"#10b981"},{l:"Total Expenses",v:fmtRWF(totalExpense),c:C.red},{l:"Realized P&L",v:fmtRWF(realizedProfit),c:realizedProfit>=0?C.accent:C.red},{l:"Herd Asset Value",v:fmtRWF(herdValue),c:C.purple}].map(s=>(
          <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c,fontSize:16}}>{s.v}</div></div>
        ))}
      </div>
      {/* Portfolio summary card */}
      <div style={{...S.card,background:totalPortfolioPnL>=0?"rgba(22,163,74,.05)":"rgba(239,68,68,.05)",border:"1px solid "+(totalPortfolioPnL>=0?"rgba(22,163,74,.25)":"rgba(239,68,68,.25)")}}>
        <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:16}}>📊 Full Portfolio P&L Summary</div>
        {[["💚 Realized Income (from sales)",fmtRWF(totalIncome),"10b981"],["🔴 Total Farm Expenses",fmtRWF(totalExpense),C.red.slice(1)],["━ Realized Net Profit",fmtRWF(realizedProfit),realizedProfit>=0?"16c784":"ef4444"],["🐷 Active Herd Market Value",fmtRWF(herdValue),"a78bfa"],["━ Est. Cost Allocated to Unsold Pigs",fmtRWF(allocatedCostUnsold),"f59e0b"],["━ Unrealized Gain/Loss (Herd)",fmtRWF(unrealizedPnL),unrealizedPnL>=0?"16c784":"ef4444"]].map(([l,v,c])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.elevated}}>
            <span style={{color:C.muted,fontSize:13}}>{l}</span>
            <span style={{fontWeight:700,color:"#"+c.replace("#",""),fontSize:13}}>{v}</span>
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12,padding:"10px 14px",borderRadius:9,background:totalPortfolioPnL>=0?C.accentSoft:"rgba(239,68,68,.08)",border:"1px solid "+(totalPortfolioPnL>=0?"rgba(22,163,74,.3)":"rgba(239,68,68,.3)")}}>
          <span style={{fontWeight:700,color:C.text,fontSize:14}}>🏆 TOTAL PORTFOLIO VALUE</span>
          <span style={{fontWeight:800,color:totalPortfolioPnL>=0?C.accent:C.red,fontSize:16}}>{fmtRWF(totalPortfolioPnL)}</span>
        </div>
        <div style={{fontSize:11,color:C.faint,marginTop:8}}>Portfolio = Realized P&L + Unrealized Herd Gain/Loss · ROI: {totalExpense>0?((totalPortfolioPnL/totalExpense)*100).toFixed(1):0}%</div>
      </div>
      <AIPrediction pigs={pigs} feeds={feeds} sales={sales} logs={logs} expenses={expenses} incomes={incomes} reproductions={reproductions} stock={stock} topic={`Full farm P&L analysis Rwanda: realized profit=${fmtRWF(realizedProfit)}, herd value=${fmtRWF(herdValue)}, total portfolio=${fmtRWF(totalPortfolioPnL)}. Give specific profit improvement actions, cost reduction strategies, investment advice for Rwanda pig farming.`} label="AI P&L Strategy" icon="💹"/>
    </div>)}

    {tab==="sold"&&(<div>
      <div style={{...S.card,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:"#10b981",marginBottom:12}}>💚 Revenue from Sold Pigs</div>
        <div style={S.g2}>
          <div><div style={{fontSize:11,color:C.faint,marginBottom:4}}>Total Sale Revenue</div><div style={{fontSize:22,fontWeight:800,color:"#10b981"}}>{fmtRWF(totalSaleInc)}</div></div>
          <div><div style={{fontSize:11,color:C.faint,marginBottom:4}}>Other Income</div><div style={{fontSize:22,fontWeight:800,color:C.accent}}>{fmtRWF(totalOtherInc)}</div></div>
        </div>
      </div>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>📋 Individual Sale Records ({sales.length})</div>
        {sales.length===0&&<div style={{color:C.faint,fontSize:13}}>No sales recorded yet.</div>}
        {sales.slice().reverse().map((s,i)=>{
          const pig=pigs.find(p=>p.id===s.pigId);
          const profit=s.total-(costPerPig);
          return(<div key={i} style={S.row}>
            <div>
              <div style={{fontWeight:600,color:C.text}}>{pig?pig.tag:"Pig"} — {s.buyer||"Unknown buyer"}</div>
              <div style={{fontSize:11,color:C.faint}}>{s.date} · {s.weight||0}kg @ RWF{fmtNum(s.priceKg)}/kg · Worker: {s.worker}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,color:"#10b981"}}>{fmtRWF(s.total)}</div>
              <div style={{fontSize:10,color:profit>=0?C.accent:C.red}}>Est. profit: {fmtRWF(profit)}</div>
            </div>
          </div>);
        })}
        {sales.length>0&&<div style={{marginTop:10,padding:"9px 13px",background:"rgba(16,185,129,.06)",borderRadius:8,display:"flex",justifyContent:"space-between"}}>
          <span style={{color:C.muted,fontSize:13}}>Total revenue from {sales.length} sale(s)</span>
          <span style={{color:"#10b981",fontWeight:700}}>{fmtRWF(totalSaleInc)}</span>
        </div>}
      </div>
    </div>)}

    {tab==="unsold"&&(<div>
      <div style={{...S.card,background:"rgba(167,139,250,.04)",border:"1px solid rgba(167,139,250,.2)"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.purple,marginBottom:12}}>🐷 Unsold (Active) Herd P&L</div>
        {[["Active Pigs",active.length+" pigs"],["Current Market Value",fmtRWF(herdValue)],["Est. Cost Invested",fmtRWF(allocatedCostUnsold)],["Unrealized Gain/Loss",fmtRWF(unrealizedPnL)]].map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.elevated}}>
            <span style={{color:C.muted,fontSize:13}}>{l}</span>
            <span style={{fontWeight:700,color:l.includes("Gain")?unrealizedPnL>=0?C.accent:C.red:C.text}}>{v}</span>
          </div>
        ))}
        <div style={{marginTop:10,fontSize:11,color:C.faint}}>Cost allocated proportionally based on total farm expenses ÷ total pig count. Market values based on current Rwanda prices.</div>
      </div>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Individual Pig P&L ({active.length} active)</div>
        {active.length===0&&<div style={{color:C.faint,fontSize:13}}>No active pigs.</div>}
        {active.sort((a,b)=>getMarketPrice(b.stage,b.weight)-getMarketPrice(a.stage,a.weight)).map((pig,i)=>{
          const val=getMarketPrice(pig.stage,pig.weight);
          const pigCost=costPerPig;
          const pigPnL=val-pigCost;
          return(<div key={i} style={S.row}>
            <div>
              <div style={{fontWeight:600,color:C.text}}>🐷 {pig.tag} — {pig.stage} ({pig.breed})</div>
              <div style={{fontSize:11,color:C.faint}}>{pig.weight}kg · {pig.gender} · {pig.status==="active"?"Active":pig.status}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,color:C.purple}}>{fmtRWF(val)}</div>
              <div style={{fontSize:10,color:pigPnL>=0?C.accent:C.red}}>P&L: {fmtRWF(pigPnL)}</div>
            </div>
          </div>);
        })}
        <div style={{marginTop:10,padding:"9px 13px",background:"rgba(167,139,250,.06)",borderRadius:8,display:"flex",justifyContent:"space-between"}}>
          <span style={{color:C.muted,fontSize:13}}>Total herd potential value</span>
          <span style={{color:C.purple,fontWeight:700}}>{fmtRWF(herdValue)}</span>
        </div>
      </div>
    </div>)}

    {tab==="30day"&&(<div>
      <div style={{...S.card,background:"rgba(22,163,74,.04)",border:"1px solid rgba(22,163,74,.2)"}}>
        <div style={{fontSize:15,fontWeight:700,color:C.accent,marginBottom:16}}>📅 30-Day Profit Forecast</div>
        {[
          ["🐷 Market-ready pigs (80kg+)",`${ready80.length} pigs`,C.accent],
          ["📦 Potential sale revenue (80kg+ pigs)",fmtRWF(potentialRevenue30),C.accent],
          ["⏳ Almost ready (65–80kg)",`${almostReady.length} pigs will likely reach 80kg`,C.amber],
          ["🐖 Expected farrowings in 30 days",`${farrowingsNext30.length} sow(s)`,C.pink],
          ["🐷 Expected piglet revenue",fmtRWF(expectedPigletValue),C.pink],
          ["🔴 Est. 30-day feed & operating costs",fmtRWF(expectedExp30),C.red],

/* ─── AI Messages ─── */
function AIMessages({users,messages,setMessages,pigs,feeds,sales,logs,expenses,incomes,reproductions,stock}){
  const [text,setText]=useState("");const [aiLoading,setAiLoading]=useState(false);const [sending,setSending]=useState(false);
  const workers=users.filter(u=>u.role==="worker"&&u.approved);
  async function generateMsg(){
    if(!getApiKey()){setText("⚠️ Please set your Anthropic API key (click the key button in the sidebar) to generate AI messages.");return;}
    setAiLoading(true);
    const totalInc=sales.reduce((s,l)=>s+(l.total||0),0)+incomes.reduce((s,l)=>s+(l.amount||0),0);
    const totalExp=feeds.reduce((s,l)=>s+(l.cost||0),0)+expenses.reduce((s,l)=>s+(l.amount||0),0);
    const sick=logs.reduce((s,l)=>s+(l.sick||0),0);
    const pregnant=(reproductions||[]).filter(r=>r.status==="pregnant").length;
    const lowStock=(stock||[]).filter(s=>s.quantity<=s.minLevel).length;
    const todayLogs=logs.filter(l=>l.date===toDay());
    const ctx=`Rwanda pig farm manager. Farm status: ${pigs.filter(p=>p.status==="active").length} active pigs, income=${fmtRWF(totalInc)}, profit=${fmtRWF(totalInc-totalExp)}, sick=${sick}, pregnant_sows=${pregnant}, low_stock_alerts=${lowStock}, logs_today=${todayLogs.length}/${workers.length}. Write a clear motivating daily message to farm workers (2-3 sentences). Simple language. Mention today's priorities.`;
    const res=await askAI(ctx,{pigs,feeds,sales,logs,expenses,incomes,reproductions:reproductions||[],stock:stock||[]});
    if(res.source==="ai") setText(res.text);
    else if(res.source==="auth_error") setText("⚠️ Invalid API key. Please update your key in the sidebar.");
    else if(res.source==="timeout") setText("⚠️ Request timed out. Check your internet connection.");
    else if(res.source==="network") setText("⚠️ Network error. Make sure you are connected to the internet.");
    else setText("⚠️ AI unavailable: "+res.text);
    setAiLoading(false);
  }
  function send(){if(!text.trim())return;setSending(true);setTimeout(()=>{setMessages(p=>[...p,{id:uid(),text:text.trim(),from:"Farm Owner (Admin)",date:toDay(),time:new Date().toLocaleTimeString("en-RW",{hour:"2-digit",minute:"2-digit"}),recipients:workers.length,aiGenerated:false}]);setText("");setSending(false);},400);}
  return(<div>
    <div style={S.h1}>📢 Messages to Workers</div>
    <div style={S.sub}>Broadcast to all {workers.length} active worker(s)</div>
    <div style={S.card}>
      <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:12}}>✍️ Compose Message</div>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <label style={S.lbl}>Message</label>
          <button onClick={generateMsg} disabled={aiLoading} style={{padding:"5px 11px",borderRadius:7,border:"1px solid rgba(167,139,250,.4)",background:"rgba(167,139,250,.08)",color:C.purple,fontSize:11,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>
            {aiLoading?<><span className="spin" style={{...S.loader,borderTopColor:C.purple}}/>Generating…</>:"✦ AI Write Message"}
          </button>
        </div>
        <textarea rows={4} value={text} onChange={e=>setText(e.target.value)} placeholder="Type a message or click ✦ AI Write Message…" style={{...S.inp,resize:"vertical"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{fontSize:11,color:C.faint}}>📬 Sending to <b style={{color:C.accent}}>{workers.length}</b> worker(s)</div>
        <button style={{...S.btn(),display:"flex",alignItems:"center",gap:6}} onClick={send} disabled={!text.trim()||sending}>
          {sending?<><span className="spin" style={S.loader}/>Sending…</>:"📤 Send to All Workers"}
        </button>
      </div>
    </div>
    <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:10}}>📬 Sent Messages ({messages.length})</div>
    {messages.length===0&&<div style={{...S.card,color:C.faint,fontSize:13}}>No messages yet.</div>}
    {messages.slice().reverse().map((m,i)=>(
      <div key={i} className="fade-in" style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
          <div><div style={{fontWeight:600,color:C.text}}>{m.from}</div><div style={{fontSize:11,color:C.faint,marginTop:2}}>{m.date} · {m.time} · {m.recipients} worker(s)</div></div>
        </div>
        <div style={{padding:"10px 13px",background:C.elevated,borderRadius:8,fontSize:13,color:C.text,lineHeight:1.7}}>{m.text}</div>
      </div>
    ))}
  </div>);
}

/* ── Admin Remote Work Management ── */
function RemoteWorkAdmin({sessions,setSessions,users}){
  const [tab,setTab]=useState("pending");
  const [noteInput,setNoteInput]=useState({});

  const pending=sessions.filter(s=>s.status==="pending");
  const active=sessions.filter(s=>s.status==="active");
  const all=sessions.slice().sort((a,b)=>b.startedAt.localeCompare(a.startedAt));

  function approve(id){
    const note=noteInput[id]||"";
    setSessions(p=>p.map(s=>s.id===id?{...s,status:"active",approvedAt:new Date().toISOString().slice(0,16).replace("T"," "),adminNote:note}:s));
    setNoteInput(p=>({...p,[id]:""}));
  }
  function reject(id){
    const note=noteInput[id]||"Rejected by admin";
    setSessions(p=>p.map(s=>s.id===id?{...s,status:"rejected",adminNote:note}:s));
    setNoteInput(p=>({...p,[id]:""}));
  }
  function terminate(id){
    setSessions(p=>p.map(s=>s.id===id?{...s,status:"ended",endedAt:new Date().toISOString().slice(0,16).replace("T"," ")}:s));
  }

  const statusColor={pending:"#f59e0b",active:"#16a34a",ended:"#6b7280",rejected:"#ef4444"};
  const statusBg={pending:"rgba(245,158,11,.1)",active:"rgba(22,163,74,.1)",ended:"rgba(107,114,128,.08)",rejected:"rgba(239,68,68,.08)"};

  return(<div>
    <div style={S.h1}>🖥️ Remote Work Approval</div>
    <div style={S.sub}>Approve or reject worker remote computer registration requests</div>

    {/* Stats */}
    <div style={S.g4}>
      {[{l:"Pending",v:pending.length,c:C.amber},{l:"Active Sessions",v:active.length,c:C.accent},{l:"Total Requests",v:sessions.length,c:C.text},{l:"Workers Online",v:new Set(active.map(s=>s.workerId)).size,c:"#10b981"}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
      ))}
    </div>

    {pending.length>0&&<div style={{padding:"10px 14px",background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.3)",borderRadius:9,marginBottom:14,fontSize:13,color:C.amber}}>
      ⚠️ {pending.length} worker(s) waiting for remote work approval
    </div>}

    {/* Tabs */}
    <div style={{display:"flex",background:C.elevated,borderRadius:8,padding:3,gap:2,border:"1px solid "+C.border,marginBottom:16}}>
      {[["pending","⏳ Pending"+(pending.length?` (${pending.length})`:"")] ,["active","✅ Active"+(active.length?` (${active.length})`:"")],["all","📋 All Sessions"]].map(([t,l])=>(
        <button key={t} style={S.tab(tab===t)} onClick={()=>setTab(t)}>{l}</button>
      ))}
    </div>

    {tab==="pending"&&(<div>
      {pending.length===0&&<div style={{...S.card,color:C.faint,fontSize:13,textAlign:"center",padding:40}}>
        <div style={{fontSize:32,marginBottom:8}}>✅</div>
        <div>No pending requests. All clear!</div>
      </div>}
      {pending.map((s,i)=>(
        <div key={i} style={{...S.card,marginBottom:12,border:"1px solid rgba(245,158,11,.3)",background:"rgba(245,158,11,.03)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div>
              <div style={{fontWeight:700,color:C.text,fontSize:14}}>👤 {s.workerName} <span style={{fontSize:11,color:C.faint}}>@{s.workerUsername}</span></div>
              <div style={{fontSize:11,color:C.faint,marginTop:2}}>Requested: {s.requestedAt}</div>
            </div>
            <span style={{padding:"3px 10px",borderRadius:20,background:statusBg.pending,color:statusColor.pending,fontSize:11,fontWeight:700}}>PENDING</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10,fontSize:12}}>
            {[["🖥️ Computer",s.computerName],["⚙️ Specs",s.computerSpec],["📍 Location",s.location],["🎯 Purpose",s.purpose]].map(([l,v])=>(
              <div key={l} style={{background:C.elevated,borderRadius:6,padding:"5px 9px"}}><span style={{color:C.faint}}>{l}: </span><span style={{color:C.text,fontWeight:600}}>{v||"—"}</span></div>
            ))}
            {s.notes&&<div style={{gridColumn:"1/-1",background:C.elevated,borderRadius:6,padding:"5px 9px"}}>

          <div style={{display:"flex",gap:8}}>

    {tab==="active"&&(<div>
      {active.length===0&&<div style={{...S.card,color:C.faint,fontSize:13,textAlign:"center",padding:40}}>

        <div>No active remote sessions.</div>
      </div>}
      {active.map((s,i)=>(
        <div key={i} style={{...S.card,marginBottom:10,border:"1px solid rgba(22,163,74,.3)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{fontWeight:700,color:C.text}}>👤 {s.workerName}</div>
              <div style={{fontSize:11,color:C.faint}}>🖥️ {s.computerName} · 📍 {s.location}</div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{padding:"3px 10px",borderRadius:20,background:statusBg.active,color:statusColor.active,fontSize:11,fontWeight:700}}>● LIVE</span>
              <button onClick={()=>terminate(s.id)} style={{...S.btn("#991b1b"),padding:"5px 11px",fontSize:11}}>End Session</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,fontSize:11}}>
            {[["Purpose",s.purpose],["Approved",s.approvedAt||"—"]].map(([l,v])=>(
              <div key={l} style={{background:C.elevated,borderRadius:5,padding:"4px 8px"}}><span style={{color:C.faint}}>{l}: </span><span style={{color:C.text}}>{v}</span></div>
            ))}
          </div>
        </div>
      ))}
    </div>)}

    {tab==="all"&&(<div>
      {all.length===0&&<div style={{...S.card,color:C.faint,fontSize:13}}>No sessions recorded.</div>}
      {all.map((s,i)=>(
        <div key={i} style={{...S.card,marginBottom:8,padding:"10px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

  </div>);
}


function App(){
  const [users,setUsers]=useState(INIT_USERS);
  const [usersLoaded,setUsersLoaded]=useState(false);
  const [pigs,setPigs]=useState(INIT_PIGS);
  const [pigsLoaded,setPigsLoaded]=useState(false);
  const [feeds,setFeeds]=useState([]);
  const [feedsLoaded,setFeedsLoaded]=useState(false);
  const [sales,setSales]=useState([]);
  const [salesLoaded,setSalesLoaded]=useState(false);
  const [logs,setLogs]=useState([]);
  const [logsLoaded,setLogsLoaded]=useState(false);
  const [expenses,setExpenses]=useState([]);
  const [expensesLoaded,setExpensesLoaded]=useState(false);
  const [incomes,setIncomes]=useState([]);
  const [incomesLoaded,setIncomesLoaded]=useState(false);
  const [messages,setMessages]=useState([]);
  const [messagesLoaded,setMessagesLoaded]=useState(false);
  const [reproductions,setReproductions]=useState([]);
  const [reproLoaded,setReproLoaded]=useState(false);
  const [sessions,setSessions]=useState([]);
  const [sessionsLoaded,setSessionsLoaded]=useState(false);
  const [stock,setStock]=useState(INIT_STOCK);
  const [stockLoaded,setStockLoaded]=useState(false);
  const [user,setUser]=useState(null);
  const [sessionLoaded,setSessionLoaded]=useState(false);
  const [page,setPage]=useState("home");
  const [showApiModal,setShowApiModal]=useState(false);

  // Load users from Firebase on mount + real-time listener
  useEffect(()=>{
    // Initial session load
    getOnlineSession().then(s=>{
      if(s) setUser(s);
      setSessionLoaded(true);
    });
    // Real-time listener on Firestore users doc — keeps admin in sync when workers register
    const unsub=db.collection("farmiq").doc("users").onSnapshot({includeMetadataChanges:false},doc=>{
      if(doc.exists&&doc.data().list){
        const fresh=doc.data().list;
        console.log("onSnapshot fired: got",fresh.length,"users, pending:",(fresh.filter(u=>u.role==="worker"&&!u.approved).length));
        // Force update — replaces local state with latest Firebase data
        setUsers([...fresh]);
      } else {
        // First time — seed admin
        setOnlineUsers(INIT_USERS);
        setUsers([...INIT_USERS]);
      }
      setUsersLoaded(true);
    },err=>{
      console.error("Firestore listener error",err);
      setUsersLoaded(true);
    });
    // Polling: check Firebase every 10 seconds for new workers
    const poll=setInterval(async()=>{
      try{
        const fresh=await getOnlineUsers();
        if(fresh&&fresh.length>0) setUsers([...fresh]);
      }catch(e){}
    },10000);

    return()=>{unsub();clearInterval(poll);};
  },[]);

  // Persist users online whenever they change (after load)
  // Removed auto-sync: was overwriting new registrations due to stale state race condition
  // Persist session online
  useEffect(()=>{if(sessionLoaded) setOnlineSession(user);},[user,sessionLoaded]);

  // Firestore real-time listeners — all farm data
  useEffect(()=>{
    const unsubs=[
      fsListen("pigs",      setPigs,      setPigsLoaded,     INIT_PIGS),
      fsListen("feeds",     setFeeds,     setFeedsLoaded,    []),
      fsListen("sales",     setSales,     setSalesLoaded,    []),
      fsListen("logs",      setLogs,      setLogsLoaded,     []),
      fsListen("expenses",  setExpenses,  setExpensesLoaded, []),
      fsListen("incomes",   setIncomes,   setIncomesLoaded,  []),
      fsListen("messages",  setMessages,  setMessagesLoaded, []),
      fsListen("reproductions",setReproductions,setReproLoaded,[]),
      fsListen("stock",     setStock,     setStockLoaded,    INIT_STOCK),
    ];
    return()=>unsubs.forEach(u=>u());
  },[]);

  // Save to Firestore whenever data changes (after initial load)
  useEffect(()=>{if(pigsLoaded)     fsSet("pigs",pigs);},[pigs,pigsLoaded]);
  useEffect(()=>{if(feedsLoaded)    fsSet("feeds",feeds);},[feeds,feedsLoaded]);
  useEffect(()=>{if(salesLoaded)    fsSet("sales",sales);},[sales,salesLoaded]);
  useEffect(()=>{if(logsLoaded)     fsSet("logs",logs);},[logs,logsLoaded]);
  useEffect(()=>{if(expensesLoaded) fsSet("expenses",expenses);},[expenses,expensesLoaded]);
  useEffect(()=>{if(incomesLoaded)  fsSet("incomes",incomes);},[incomes,incomesLoaded]);
  useEffect(()=>{if(messagesLoaded) fsSet("messages",messages);},[messages,messagesLoaded]);
  useEffect(()=>{if(reproLoaded)    fsSet("reproductions",reproductions);},[reproductions,reproLoaded]);
  useEffect(()=>{if(stockLoaded)    fsSet("stock",stock);},[stock,stockLoaded]);

  // Firestore real-time listener for remote work sessions
  useEffect(()=>{
    const unsub=db.collection("farmiq").doc("remoteSessions").onSnapshot(doc=>{
      if(doc.exists&&doc.data().list) setSessions(doc.data().list);
      else setSessions([]);
      setSessionsLoaded(true);
    },err=>{ console.error("Sessions listener error",err); setSessionsLoaded(true); });
    return()=>unsub();
  },[]);
  // Save sessions to Firestore whenever they change
  useEffect(()=>{
    if(!sessionsLoaded) return;
    db.collection("farmiq").doc("remoteSessions").set({list:sessions,updatedAt:new Date().toISOString()});
  },[sessions,sessionsLoaded]);

  // Timeout fallback — if Firebase takes too long, show app anyway
  const [forceShow,setForceShow]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setForceShow(true),6000);return()=>clearTimeout(t);},[]);

  if(!forceShow&&(!sessionLoaded||!usersLoaded||!sessionsLoaded||!pigsLoaded||!feedsLoaded||!salesLoaded||!logsLoaded||!expensesLoaded||!incomesLoaded||!messagesLoaded||!reproLoaded||!stockLoaded)) return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f2318 0%,#1a3a2a 100%)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
    <div style={{width:56,height:56,borderRadius:16,background:"rgba(74,222,128,.12)",border:"1px solid rgba(74,222,128,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🐷</div>
    <div style={{color:"#4ade80",fontSize:14,fontWeight:600,letterSpacing:2}}>LOADING FARMIQ…</div>
    <div style={{width:120,height:3,background:"rgba(255,255,255,.1)",borderRadius:3,overflow:"hidden"}}><div style={{width:"60%",height:"100%",background:"#4ade80",borderRadius:3,animation:"spin 1s linear infinite"}}/></div>
  </div>);

  if(!user)return <Login users={users} setUsers={setUsers} setUser={setUser}/>;
  const isAdmin=user.role==="admin";
  const pending=users.filter(u=>u.role==="worker"&&!u.approved);
  const lowStockCount=(stock||[]).filter(s=>s.quantity<=s.minLevel).length;
  const upcomingFarrows=reproductions.filter(r=>r.status==="pregnant"&&daysDiff(r.expectedFarrow)>=0&&daysDiff(r.expectedFarrow)<=7).length;
  const allData={pigs,feeds,sales,logs,expenses,incomes,users,messages,reproductions,stock};

  const adminNav=[
    {id:"home",l:"📊 Overview"},
    {id:"ai",l:"🤖 AI Advisor"},
    {id:"pnl",l:"💹 P&L Analysis"},
    {id:"market",l:"📈 RW Market"},
    {id:"reproduction",l:"🐖 Reproduction"+(upcomingFarrows>0?" ("+upcomingFarrows+")":"")},
    {id:"stock",l:"📦 Stock"+(lowStockCount>0?" ⚠️"+lowStockCount:"")},
    {id:"ledger",l:"📒 Ledger"},
    {id:"finance",l:"💰 Financials"},
    {id:"pigs",l:"🐷 Pigs"},
    {id:"feeding",l:"🌾 Feeding"},
    {id:"sales",l:"🏷️ Sales"},
    {id:"daylogs",l:"📋 Daily Logs"},
    {id:"messages",l:"📢 Messages"+(messages.length?" ("+messages.length+")":"")},
    {id:"workers",l:"👷 Workers"+(pending.length?" ("+pending.length+")":"")},
    {id:"remote",l:"🖥️ Remote Work"+(sessions.filter(s=>s.status==="pending").length?" ⚠️"+sessions.filter(s=>s.status==="pending").length:"")}
  ];
  const workerNav=[
    {id:"home",l:"🏠 Dashboard"},
    {id:"inbox",l:"📬 Inbox"+(messages.length?" ("+messages.length+")":"")},
    {id:"dailyentry",l:"📝 Daily Report"},
    {id:"feedentry",l:"🌾 Log Feeding"},
    {id:"saleentry",l:"🏷️ Log Sale"},
    {id:"remotework",l:"🖥️ Remote Work"+(sessions.filter(s=>s.workerId===user.id&&s.status==="active").length?" ●":"")}
  ];
  const nav=isAdmin?adminNav:workerNav;

  return(<div style={S.app}>
    {showApiModal&&<ApiKeyModal onClose={()=>setShowApiModal(false)}/>}
    <div style={S.side}>
      <div style={{padding:"18px 18px 16px",borderBottom:"1px solid rgba(255,255,255,.12)",marginBottom:6,flexShrink:0}}>
        <div style={{fontSize:17,fontWeight:700,color:"#fff"}}>🐷 FarmIQ</div>
        <div style={{fontSize:9,color:"rgba(255,255,255,.5)",letterSpacing:1.5,textTransform:"uppercase",marginTop:2}}>AI Farm Manager · Rwanda</div>
      </div>
      <div style={{padding:"8px 14px 6px",flexShrink:0}}>
        <button onClick={()=>setShowApiModal(true)} style={{width:"100%",padding:"7px 11px",borderRadius:8,border:"1px solid "+(getApiKey()?"rgba(74,222,128,.3)":"rgba(245,158,11,.4)"),background:getApiKey()?"rgba(74,222,128,.08)":"rgba(245,158,11,.07)",color:getApiKey()?"#4ade80":"#fbbf24",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,display:"flex",alignItems:"center",gap:7,justifyContent:"center"}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:getApiKey()?"#4ade80":"#fbbf24",flexShrink:0}}/>
          {getApiKey()?"✦ AI Online · Claude":"🔑 Set API Key"}
        </button>
      </div>
      {nav.map(n=><button key={n.id} style={S.nb(page===n.id)} onClick={()=>setPage(n.id)}>{n.l}</button>)}
      {isAdmin&&(<div style={{padding:"12px 18px",borderTop:"1px solid rgba(255,255,255,.12)",marginTop:6,flexShrink:0}}>
        <div style={{fontSize:9,color:"rgba(255,255,255,.45)",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📄 Download Reports</div>
        <PDFBtn label="Full Report" type="farm" getData={()=>allData} icon="📄" color="#2d6a4f"/>
        <div style={{marginTop:6}}><PDFBtn label="P&L Report" type="pnl" getData={()=>allData} icon="💹" color="#2d6a4f"/></div>
      </div>)}
      <div style={S.ui}>
        <div style={{fontSize:13,fontWeight:600,color:"#fff"}}>{user.name}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:8,textTransform:"capitalize"}}>{user.role}</div>
        <button style={{...S.btn("#991b1b"),fontSize:12,padding:"6px 13px"}} onClick={()=>setUser(null)}>Sign Out</button>
      </div>
    </div>
    <div style={S.main}>
      {/* Real-time pending worker alert banner for admin */}
      {isAdmin&&pending.length>0&&page!=="workers"&&(
        <div style={{
          display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,
          padding:"12px 16px",marginBottom:16,
          background:"linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.08))",
          border:"1.5px solid rgba(245,158,11,.5)",borderRadius:12,
          animation:"pulse 2s ease-in-out infinite"
        }}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>🔔</span>
            <div>
              <div style={{fontWeight:700,color:"#92400e",fontSize:14}}>
                {pending.length} Worker{pending.length>1?"s":""} Waiting for Approval
              </div>
              <div style={{fontSize:12,color:"#b45309",marginTop:2}}>
                {pending.map(w=>w.name).join(", ")} registered and need{pending.length===1?"s":""} your approval to log in.
              </div>
            </div>
          </div>
          <button onClick={()=>setPage("workers")} style={{
            padding:"9px 18px",borderRadius:9,border:"none",cursor:"pointer",

            color:"#fff",fontWeight:700,fontSize:13,fontFamily:"inherit",
            boxShadow:"0 2px 8px rgba(180,83,9,.4)",whiteSpace:"nowrap"
          }}>✓ Review Now →</button>
        </div>
      )}
      {isAdmin&&page==="home"&&<AHome pigs={pigs} feeds={feeds} sales={sales} logs={logs} users={users} expenses={expenses} incomes={incomes} reproductions={reproductions} stock={stock} allData={allData} setPage={setPage}/>}

      {isAdmin&&page==="reproduction"&&<ReproductionModule pigs={pigs} reproductions={reproductions} setReproductions={setReproductions} feeds={feeds} sales={sales} logs={logs} expenses={expenses} incomes={incomes} stock={stock}/>}
      {isAdmin&&page==="stock"&&<StockManager stock={stock} setStock={setStock} feeds={feeds} pigs={pigs}/>}
      {isAdmin&&page==="ledger"&&<Ledger expenses={expenses} setExpenses={setExpenses} incomes={incomes} setIncomes={setIncomes} feeds={feeds} sales={sales}/>}
      {isAdmin&&page==="finance"&&<Fin feeds={feeds} sales={sales} pigs={pigs} logs={logs} expenses={expenses} incomes={incomes} allData={allData}/>}
      {isAdmin&&page==="pigs"&&<Pigs pigs={pigs} setPigs={setPigs} logs={logs} allData={allData}/>}
      {isAdmin&&page==="feeding"&&<FeedLog feeds={feeds} pigs={pigs} logs={logs} sales={sales} expenses={expenses} incomes={incomes} allData={allData}/>}
      {isAdmin&&page==="sales"&&<SaleLog sales={sales} pigs={pigs} feeds={feeds} logs={logs} expenses={expenses} incomes={incomes} allData={allData}/>}
      {isAdmin&&page==="daylogs"&&<DLogs logs={logs} pigs={pigs} feeds={feeds} sales={sales} expenses={expenses} incomes={incomes} allData={allData}/>}
      {isAdmin&&page==="messages"&&<AIMessages users={users} messages={messages} setMessages={setMessages} pigs={pigs} feeds={feeds} sales={sales} logs={logs} expenses={expenses} incomes={incomes} reproductions={reproductions} stock={stock}/>}
      {isAdmin&&page==="workers"&&<Workers users={users} setUsers={setUsers}/>}
      {isAdmin&&page==="remote"&&<RemoteWorkAdmin sessions={sessions} setSessions={setSessions} users={users}/>}
      {!isAdmin&&page==="home"&&<WHome user={user} logs={logs} feeds={feeds} sales={sales} messages={messages}/>}
      {!isAdmin&&page==="inbox"&&<WorkerInbox messages={messages}/>}
      {!isAdmin&&page==="dailyentry"&&<DEntry user={user} pigs={pigs} logs={logs} setLogs={setLogs}/>}

      {!isAdmin&&page==="remotework"&&<RemoteWorkPanel user={user} sessions={sessions} setSessions={setSessions} messages={messages}/>}
    </div>

}

/* ─── Login ─── */
function Login({users,setUsers,setUser}){
  const [tab,setTab]=useState("login");
  const [form,setForm]=useState({name:"",username:"",password:"",confirmPassword:""});
  const [err,setErr]=useState("");
  const [ok,setOk]=useState("");
  const [loading,setLoading]=useState(false);

  async function login(){
    setErr("");
    if(!form.username||!form.password) return setErr("Please enter username and password.");
    setLoading(true);
    // Always read freshest users (catches newly approved workers)
    let freshUsers=await getOnlineUsers();
    if(!freshUsers||freshUsers.length===0) freshUsers=users;
    const u=freshUsers.find(u=>u.username.toLowerCase()===form.username.toLowerCase()&&u.password===form.password);
    setLoading(false);
    if(!u) return setErr("Incorrect username or password.");
    if(!u.approved) return setErr("Your account is pending admin approval. Please wait.");
    setUser(u);
  }

  async function reg(){
    setErr("");
    if(!form.name||!form.username||!form.password) return setErr("Please fill in all required fields.");
    if(form.password.length<6) return setErr("Password must be at least 6 characters.");
    if(form.password!==form.confirmPassword) return setErr("Passwords do not match.");
    setLoading(true);
    try{
      // Always fetch FRESH users from Firebase before saving to avoid stale overwrites
      let freshUsers=await getOnlineUsers();
      if(!freshUsers||freshUsers.length===0) freshUsers=users;
      if(freshUsers.find(u=>u.username.toLowerCase()===form.username.toLowerCase())){
        setLoading(false);
        return setErr("That username is already taken.");
      }
      const newUser={id:uid(),name:form.name.trim(),username:form.username.trim(),password:form.password,role:"worker",approved:false};
      const updated=[...freshUsers,newUser];
      await setOnlineUsers(updated);
      setUsers(updated);
      setOk("Account created! An admin must approve your access before you can sign in.");
      setErr("");
      setTab("login");
      setForm({name:"",username:"",password:"",confirmPassword:""});
    }catch(e){
      console.error("reg error",e);
      setErr("Registration failed. Please check your connection and try again.");
    }
    setLoading(false);
  }

  const cardStyle={
    width:420,background:"#fff",borderRadius:20,
    boxShadow:"0 20px 60px rgba(0,0,0,.12), 0 4px 16px rgba(22,163,74,.08)",
    overflow:"hidden",border:"1px solid rgba(22,163,74,.15)"
  };
  const headerStyle={
    background:"linear-gradient(135deg,#0f2318 0%,#1a3d26 60%,#0f4020 100%)",
    padding:"32px 36px 28px",position:"relative",overflow:"hidden"

  const bodyStyle={padding:"28px 36px 32px"};
  const inp2={
    background:"#f8fafc",border:"1.5px solid #e2e8f0",color:"#1e293b",
    borderRadius:10,padding:"11px 14px",width:"100%",fontSize:13.5,outline:"none",
    boxSizing:"border-box",fontFamily:"inherit",transition:"border-color .2s, box-shadow .2s"

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f0fdf4 0%,#ecfdf5 40%,#e0f2fe 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {/* Decorative background blobs */}
      <div style={{position:"fixed",top:"-10%",right:"-5%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(22,163,74,.07) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"fixed",bottom:"-10%",left:"-5%",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(16,185,129,.06) 0%,transparent 70%)",pointerEvents:"none"}}/>

      <div style={cardStyle} className="fade-in">
        {/* Header */}
        <div style={headerStyle}>
          {/* Decorative circles */}
          <div style={{position:"absolute",top:-30,right:-30,width:130,height:130,borderRadius:"50%",background:"rgba(74,222,128,.06)",border:"1px solid rgba(74,222,128,.12)"}}/>
          <div style={{position:"absolute",bottom:-20,left:-20,width:90,height:90,borderRadius:"50%",background:"rgba(74,222,128,.04)"}}/>
          <div style={{position:"relative",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:14,background:"rgba(74,222,128,.15)",border:"1px solid rgba(74,222,128,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>🐷</div>
            <div>
              <div style={{fontSize:22,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>FarmIQ</div>
              <div style={{fontSize:9.5,color:"rgba(74,222,128,.8)",letterSpacing:2.5,textTransform:"uppercase",marginTop:2,fontWeight:600}}>AI Pig Farm · Rwanda</div>

          <div style={{position:"relative",marginTop:18,fontSize:13,color:"rgba(255,255,255,.55)",lineHeight:1.5}}>

          </div>
          {/* Online badge */}
          <div style={{position:"absolute",top:16,right:16,padding:"4px 10px",borderRadius:20,background:"rgba(74,222,128,.18)",border:"1px solid rgba(74,222,128,.35)",fontSize:10,color:"#4ade80",fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:"#4ade80",display:"inline-block",animation:"pulse 2s ease-in-out infinite"}}/>ONLINE
          </div>

        {/* Body */}
        <div style={bodyStyle}>
          {/* Tabs */}
          <div style={{display:"flex",background:"#f1f5f9",borderRadius:11,padding:3,marginBottom:24,gap:2}}>

              <button key={t} onClick={()=>{setTab(t);setErr("");setOk("");}} style={{
                flex:1,padding:"9px 6px",border:"none",borderRadius:9,
                background:tab===t?"#fff":"transparent",

          </div>

          {/* Fields */}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

              <div>
                <label style={lbl2}>Full Name <span style={{color:"#ef4444"}}>*</span></label>
                <input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Jean Pierre Habimana" style={inp2}
                  onFocus={e=>{e.target.style.borderColor="#16a34a";e.target.style.boxShadow="0 0 0 3px rgba(22,163,74,.1)";}}
                  onBlur={e=>{e.target.style.borderColor="#e2e8f0";e.target.style.boxShadow="none";}}/>
              </div>
            )}
            <div>
              <label style={lbl2}>Username <span style={{color:"#ef4444"}}>*</span></label>
              <input value={form.username} onChange={e=>setForm({...form,username:e.target.value})} placeholder="your_username" style={inp2} autoCapitalize="none" autoCorrect="off"
                onFocus={e=>{e.target.style.borderColor="#16a34a";e.target.style.boxShadow="0 0 0 3px rgba(22,163,74,.1)";}}

              <label style={lbl2}>Password <span style={{color:"#ef4444"}}>*</span></label>

/* ─── Admin Home ─── */
function AHome({pigs,feeds,sales,logs,users,expenses,incomes,reproductions,stock,allData,setPage}){
  const active=pigs.filter(p=>p.status==="active");
  const totalInc=sales.reduce((s,l)=>s+(l.total||0),0)+incomes.reduce((s,l)=>s+(l.amount||0),0);
  const totalExp=feeds.reduce((s,l)=>s+(l.cost||0),0)+expenses.reduce((s,l)=>s+(l.amount||0),0);
  const profit=totalInc-totalExp;
  const herdValue=active.reduce((s,pig)=>s+getMarketPrice(pig.stage,pig.weight),0);
  const pregnant=reproductions.filter(r=>r.status==="pregnant");
  const lowStock=stock.filter(s=>s.quantity<=s.minLevel);
  const upcomingFarrows=pregnant.filter(r=>daysDiff(r.expectedFarrow)<=7&&daysDiff(r.expectedFarrow)>=0);
  const recentActivity=[...feeds.map(f=>({...f,type:"feed"})),...sales.map(s=>({...s,type:"sale"})),...logs.map(l=>({...l,type:"log"}))].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,6);
  return(<div>
    <div style={S.h1}>📊 Farm Overview</div>
    <div style={S.sub}>{toDay()} · FarmIQ AI Management</div>

    {/* Smart alerts */}
    {upcomingFarrows.length>0&&<div onClick={()=>setPage("reproduction")} style={{padding:"10px 14px",background:"rgba(244,114,182,.08)",border:"1px solid rgba(244,114,182,.3)",borderRadius:9,marginBottom:10,fontSize:13,color:C.pink,cursor:"pointer"}}>
      🐖 {upcomingFarrows.length} farrowing(s) in ≤7 days → Click to view

    {lowStock.length>0&&<div onClick={()=>setPage("stock")} style={{padding:"10px 14px",background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.25)",borderRadius:9,marginBottom:10,fontSize:13,color:C.red,cursor:"pointer"}}>
      📦 {lowStock.length} low stock alert(s): {lowStock.map(s=>s.name).join(", ")} → Click to restock
    </div>}

    {/* Main stats */}
    <div style={S.g4}>
      {[{l:"Active Pigs",v:active.length,c:C.accent},{l:"Total Income",v:fmtRWF(totalInc),c:"#10b981"},{l:"Net Profit",v:fmtRWF(profit),c:profit>=0?C.accent:C.red},{l:"Herd Value",v:fmtRWF(herdValue),c:C.purple}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c,fontSize:s.v.length>8?15:22}}>{s.v}</div></div>
      ))}
    </div>
    <div style={S.g4}>
      {[{l:"Market Ready (80kg+)",v:active.filter(p=>p.weight>=80).length,c:C.amber},{l:"Pregnant Sows",v:pregnant.length,c:C.pink},{l:"Workers",v:users.filter(u=>u.role==="worker"&&u.approved).length,c:C.blue},{l:"Logs Today",v:logs.filter(l=>l.date===toDay()).length,c:C.muted}].map(s=>(
        <div key={s.l} style={S.stat}><div style={S.sl}>{s.l}</div><div style={{...S.sv,color:s.c}}>{s.v}</div></div>
      ))}
    </div>

    <div style={S.g2}>
      <div style={S.card}>
        <div style={{fontSize:13,fontWeight:700,color:C.accent,marginBottom:10}}>📋 Recent Activity</div>
        {recentActivity.length===0&&<div style={{color:C.faint,fontSize:13}}>No activity yet.</div>}
        {recentActivity.map((l,i)=>(
          <div key={i} style={S.row}><span style={{color:C.muted}}>{l.type==="feed"?"🌾 ":l.type==="sale"?"🏷️ ":"📝 "}{l.worker||l.buyer}</span><span style={{color:C.accent,fontWeight:600}}>{l.total?fmtRWF(l.total):l.cost?fmtRWF(l.cost):"✓"}</span></div>

        <div style={{fontSize:13,fontWeight:700,color:C.purple,marginBottom:10}}>💹 Portfolio Snapshot</div>

          <div key={l} style={S.row}><span style={{color:C.muted,fontSize:12}}>{l}</span><span style={{fontWeight:700,color:c,fontSize:12}}>{v}</span></div>

    </div>
  </div>);
